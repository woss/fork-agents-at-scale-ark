apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ark-completions.fullname" . }}
  namespace: {{ include "ark-completions.namespace" . }}
  labels:
    app: ark-completions
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: ark-completions
  template:
    metadata:
      labels:
        app: ark-completions
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ark-completions.serviceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
      containers:
        - name: completions
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--addr=:{{ .Values.targetPort }}"
          ports:
            - containerPort: {{ .Values.targetPort }}
              protocol: TCP
          env:
          - name: OTEL_SERVICE_NAME
            value: "ark-completions"
          - name: ARK_TELEMETRY_OTEL_DISCOVERY
            value: "true"
          {{- if .Values.namespaceScopedDiscovery }}
          # Per-tenant pods are authorized by a namespaced Role, which cannot
          # satisfy the cluster-wide List that broker/target discovery does by
          # default. Scope discovery to this pod's own namespace, where its
          # ark-broker/ark-config-broker live.
          - name: ARK_DISCOVERY_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          {{- end }}
          {{- if .Values.customCACert.enabled }}
          - name: SSL_CERT_FILE
            value: "/etc/ssl/certs/custom-ca/{{ .Values.customCACert.key }}"
          {{- end }}
          envFrom:
          - configMapRef:
              name: otel-environment-variables
              optional: true
          - secretRef:
              name: otel-environment-variables
              optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          {{- if or .Values.customCACert.enabled .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.customCACert.enabled }}
            - name: custom-ca-cert
              mountPath: /etc/ssl/certs/custom-ca
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- if or .Values.customCACert.enabled .Values.extraVolumes }}
      volumes:
        {{- if .Values.customCACert.enabled }}
        - name: custom-ca-cert
          secret:
            secretName: {{ .Values.customCACert.secretName }}
            items:
              - key: {{ .Values.customCACert.key }}
                path: {{ .Values.customCACert.key }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
