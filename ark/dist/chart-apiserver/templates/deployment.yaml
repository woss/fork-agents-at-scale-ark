apiVersion: apps/v1
kind: Deployment
metadata:
  name: ark-apiserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ark-apiserver.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "ark-apiserver.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ark-apiserver.labels" . | nindent 8 }}
    spec:
      {{- $ssl := .Values.postgresql }}
      {{- if or (and $ssl.sslClientCertKey (not $ssl.sslClientKeyKey)) (and $ssl.sslClientKeyKey (not $ssl.sslClientCertKey)) }}
      {{- fail "postgresql.sslClientCertKey and postgresql.sslClientKeyKey must be set together for mutual TLS" }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
        {{- if .Values.postgresql.sslSecretName }}
        fsGroup: {{ .Values.containerSecurityContext.runAsGroup | default .Values.postgresql.sslFsGroup }}
        {{- end }}
      containers:
        - name: manager
          image: {{ include "ark-apiserver.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --role=apiserver
            - --leader-elect
            - --metrics-bind-address=0
            - --health-probe-bind-address=:8081
          env:
            - name: ENABLE_WEBHOOKS
              value: "false"
            - name: ARK_STORAGE_BACKEND
              value: postgresql
            - name: ARK_APISERVER_PORT
              value: {{ .Values.apiserver.port | quote }}
            {{- include "ark-apiserver.postgresEnv" . | nindent 12 }}
            {{- if .Values.certManager.enabled }}
            - name: ARK_APISERVER_TLS_CERT_FILE
              value: /etc/ark/apiserver-tls/tls.crt
            - name: ARK_APISERVER_TLS_KEY_FILE
              value: /etc/ark/apiserver-tls/tls.key
            {{- end }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if or .Values.certManager.enabled .Values.postgresql.sslSecretName }}
          volumeMounts:
            {{- if .Values.certManager.enabled }}
            - name: apiserver-tls
              mountPath: /etc/ark/apiserver-tls
              readOnly: true
            {{- end }}
            {{- if .Values.postgresql.sslSecretName }}
            - name: postgres-tls
              mountPath: /etc/ark/postgres-tls
              readOnly: true
            {{- end }}
          {{- end }}
          ports:
            - name: https
              containerPort: {{ .Values.apiserver.port }}
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      {{- if or .Values.certManager.enabled .Values.postgresql.sslSecretName }}
      volumes:
        {{- if .Values.certManager.enabled }}
        - name: apiserver-tls
          secret:
            secretName: ark-apiserver-tls
        {{- end }}
        {{- if .Values.postgresql.sslSecretName }}
        - name: postgres-tls
          secret:
            secretName: {{ .Values.postgresql.sslSecretName }}
            defaultMode: 0640
        {{- end }}
      {{- end }}
