# [MANAGER]: Manager Deployment Configurations
controllerManager:
  replicas: 1
  # Maximum number of Query executions running concurrently in goroutines.
  # When the cap is reached, Reconcile requeues so the workqueue holds the
  # backlog instead of the controller heap. Set to 0 to disable enforcement
  # (not recommended — historical default behaviour, susceptible to OOM
  # under burst load, see issue #2597).
  maxConcurrentQueries: 32
  # Maximum number of Query reconciles running in parallel. The workqueue
  # dedupes per-key, so this only enables concurrency across different Query
  # objects. Set to 0 to use the controller-runtime default (1). See issue
  # #2609.
  maxConcurrentReconciles: 4
  container:
    image:
      repository: ghcr.io/mckinsey/agents-at-scale-ark/ark-controller
      # tag defaults to .Chart.AppVersion if not specified
      pullPolicy: IfNotPresent
    args:
      - "--leader-elect"
      - "--metrics-bind-address=:8443"
      - "--health-probe-bind-address=:8081"
    env:
      ARK_MODEL_PROBE_TIMEOUT_SECONDS: "60"
      ARK_A2A_DISCOVERY_TIMEOUT: "30"
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
    livenessProbe:
      initialDelaySeconds: 60
      periodSeconds: 20
      timeoutSeconds: 10
      failureThreshold: 3
      httpGet:
        path: /healthz
        port: 8081
    readinessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 10
      failureThreshold: 3
      httpGet:
        path: /readyz
        port: 8081
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  extraVolumeMounts: []
  extraVolumes: []
  terminationGracePeriodSeconds: 10
  serviceAccountName: ark-controller

completions:
  addr: "http://ark-completions.ark-system" # NOSONAR - cluster-internal service communication

# [RBAC]: To enable RBAC (Permissions) configurations
rbac:
  enable: true
  # Service account impersonation for multi-tenancy
  impersonation:
    # Enable impersonation to allow the controller to execute queries using the
    # service account specified in each Query resource. This is required for
    # multi-tenancy and namespace isolation.
    #
    # When enabled (default), the controller can impersonate ANY service account.
    # When disabled, queries can only run with the controller's own identity.
    #
    # Note: In future releases, query execution will be handled by per-namespace
    # 'query executor' pods, separating concerns between the controller (validation,
    # admission, mutation) and query execution (running with proper identity).
    enabled: true

# [CRDs]: To enable the CRDs
crd:
  # This option determines whether the CRDs are included in the installation.
  # NOTE: CRDs are automatically disabled when storage.backend is not "etcd"
  # (e.g., postgresql), since the embedded apiserver serves the APIs.
  enable: true

  # Enabling this option adds the "helm.sh/resource-policy": keep
  # annotation to the CRD, ensuring it remains installed even when
  # the Helm release is uninstalled.
  keep: true

# [METRICS]: Set to true to generate manifests for exporting metrics.
# To disable metrics export set false, and ensure that the
# ControllerManager argument "--metrics-bind-address=:8443" is removed.
metrics:
  enable: true

# [WEBHOOKS]: Webhooks configuration
# The following configuration is automatically generated from the manifests
# generated by controller-gen. To update run 'make manifests' and
# the edit command with the '--force' flag
webhook:
  enable: true
  timeoutSeconds: 30
  failurePolicy: Fail

# [PROMETHEUS]: To enable a ServiceMonitor to export metrics to Prometheus set true
prometheus:
  enable: false

# [CERT-MANAGER]: To enable cert-manager injection to webhooks set true
certmanager:
  enable: true

# [NETWORK POLICIES]: To enable NetworkPolicies set true
networkPolicy:
  enable: false

# Container registry configuration
containerRegistry:
  enabled: false
  server: ""
  username: ""
  password: ""
  email: ""

# Custom CA certificate configuration
# When set, mounts a CA certificate from a Kubernetes secret to trust custom certificate authorities
customCACert:
  enabled: false
  secretName: "custom-ca-cert"
  key: "ca.crt"

# [MODEL-URL-SECURITY]: Model URL security configuration
# Opt-in domain whitelist: When enabled, restricts to specific domains
# Opt-in private IP allowlist: When enabled, allows specific internal IP ranges
modelUrlSecurity:
  configMapName: "model-url-security"
  domainWhitelist:
    enabled: false
    key: "whitelisted-domains"
  privateIPAllowlist:
    enabled: false
    key: "allowed-private-ips"

# [TELEMETRY]: Telemetry and tracing configuration
telemetry:
  tenantRouting:
    # Enable per-tenant OTEL endpoint discovery from Secrets.
    # When enabled, the controller looks for Secrets named "otel-environment-variables"
    # in each namespace containing OTEL_EXPORTER_OTLP_ENDPOINT and optional
    # OTEL_EXPORTER_OTLP_HEADERS, then routes traces to those endpoints.
    otelDiscovery: false
# [STORAGE]: Storage backend configuration for embedded API server
# When backend is set to "postgresql", an embedded API server is started
# and Ark resources are stored in PostgreSQL instead of etcd via CRDs.
# NOTE: When using postgresql, CRDs are automatically skipped and APIService
# resources are created to route API requests to the embedded apiserver.
storage:
  # Options: "etcd" (default, uses CRDs), "postgresql"
  backend: "etcd"
  apiserver:
    port: 6443
  postgresql:
    host: ""
    port: 5432
    database: "ark"
    user: ""
    passwordSecretName: ""
    passwordSecretKey: "password"
    sslMode: "disable"
