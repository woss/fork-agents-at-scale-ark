{{- if eq (include "chart.crdEnabled" .) "true" }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.18.0
  name: mcpservers.ark.mckinsey.com
spec:
  group: ark.mckinsey.com
  names:
    kind: MCPServer
    listKind: MCPServerList
    plural: mcpservers
    singular: mcpserver
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Available')].status
      name: Available
      type: string
    - description: Discovery status
      jsonPath: .status.conditions[?(@.type=='Discovering')].status
      name: Discovering
      type: string
    - description: Number of tools
      jsonPath: .status.toolCount
      name: Tools
      type: integer
    - description: OAuth authorization state
      jsonPath: .status.authorization.state
      name: Auth
      type: string
    - description: Age
      jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              address:
                description: ValueSource represents a source for a configuration value
                properties:
                  value:
                    type: string
                  valueFrom:
                    properties:
                      configMapKeyRef:
                        description: Selects a key from a ConfigMap.
                        properties:
                          key:
                            description: The key to select.
                            type: string
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                          optional:
                            description: Specify whether the ConfigMap or its key
                              must be defined
                            type: boolean
                        required:
                        - key
                        type: object
                        x-kubernetes-map-type: atomic
                      queryParameterRef:
                        properties:
                          name:
                            description: Name of the parameter from the Query resource
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      secretKeyRef:
                        description: SecretKeySelector selects a key of a Secret.
                        properties:
                          key:
                            description: The key of the secret to select from.  Must
                              be a valid secret key.
                            type: string
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                          optional:
                            description: Specify whether the Secret or its key must
                              be defined
                            type: boolean
                        required:
                        - key
                        type: object
                        x-kubernetes-map-type: atomic
                      serviceRef:
                        properties:
                          name:
                            description: Name of the service
                            type: string
                          namespace:
                            description: Namespace of the service. Defaults to the
                              namespace as the resource.
                            type: string
                          path:
                            description: Path component of the service URL. For anthropic
                              models might be 'v1', for gemini might be 'v1beta/openai',
                              for MCP servers often will be 'mcp' or 'sse'.
                            type: string
                          port:
                            description: Port name to use. If not specified, uses
                              the service's only port or first port.
                            type: string
                        required:
                        - name
                        type: object
                    type: object
                type: object
              authorization:
                description: |-
                  Authorization configures how the controller obtains and injects
                  credentials for OAuth-protected MCP servers. When unset, the
                  controller does not attempt to inject Authorization headers.
                properties:
                  tokenSecretRef:
                    description: |-
                      TokenSecretRef references the Kubernetes Secret holding OAuth
                      tokens and client credentials. The Secret MUST exist in the same
                      namespace as the MCPServer.
                    properties:
                      accessTokenKey:
                        default: access_token
                        type: string
                      clientIDKey:
                        default: client_id
                        type: string
                      clientSecretKey:
                        default: client_secret
                        type: string
                      expiresAtKey:
                        default: expires_at
                        type: string
                      name:
                        type: string
                      refreshTokenKey:
                        default: refresh_token
                        type: string
                    required:
                    - name
                    type: object
                required:
                - tokenSecretRef
                type: object
              description:
                type: string
              headers:
                items:
                  properties:
                    name:
                      minLength: 1
                      type: string
                    value:
                      properties:
                        value:
                          type: string
                        valueFrom:
                          properties:
                            configMapKeyRef:
                              description: Selects a key from a ConfigMap.
                              properties:
                                key:
                                  description: The key to select.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the ConfigMap or its
                                    key must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                            queryParameterRef:
                              properties:
                                name:
                                  description: Name of the parameter from the Query
                                    resource
                                  minLength: 1
                                  type: string
                              required:
                              - name
                              type: object
                            secretKeyRef:
                              description: SecretKeySelector selects a key of a Secret.
                              properties:
                                key:
                                  description: The key of the secret to select from.  Must
                                    be a valid secret key.
                                  type: string
                                name:
                                  default: ""
                                  description: |-
                                    Name of the referent.
                                    This field is effectively required, but due to backwards compatibility is
                                    allowed to be empty. Instances of this type with an empty value here are
                                    almost certainly wrong.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                optional:
                                  description: Specify whether the Secret or its key
                                    must be defined
                                  type: boolean
                              required:
                              - key
                              type: object
                              x-kubernetes-map-type: atomic
                          type: object
                      type: object
                  required:
                  - name
                  - value
                  type: object
                type: array
              pollInterval:
                default: 1m
                type: string
              timeout:
                default: 30s
                description: |-
                  Timeout specifies the maximum duration for MCP tool calls to this server.
                  Use this to support long-running operations (e.g., "5m", "10m", "30m").
                  Defaults to "30s" if not specified.
                type: string
              transport:
                default: http
                enum:
                - http
                - sse
                type: string
            required:
            - address
            - transport
            type: object
          status:
            description: MCPServerStatus defines the observed state of MCPServer
            properties:
              authorization:
                description: |-
                  Authorization holds OAuth 2.1 / RFC 9728 discovery metadata when the
                  MCP server requires authorization. Populated by the controller when
                  a 401 response is received; not set otherwise.
                properties:
                  authorizationEndpoint:
                    description: |-
                      AuthorizationEndpoint is the OAuth 2.1 authorization endpoint
                      (RFC 8414 `authorization_endpoint`).
                    type: string
                  authorizationServers:
                    description: |-
                      AuthorizationServers is the list of authorization server issuers
                      the MCP resource trusts (RFC 9728 `authorization_servers`).
                    items:
                      type: string
                    type: array
                  expiresAt:
                    description: |-
                      ExpiresAt is the absolute time at which the current access_token
                      expires, published for dashboard / observability consumers that
                      may have `get` on mcpservers but not on secrets.
                    format: date-time
                    type: string
                  grantTypesSupported:
                    description: |-
                      GrantTypesSupported is the set of OAuth grant types the
                      authorization server supports (RFC 8414 `grant_types_supported`).
                    items:
                      type: string
                    type: array
                  lastDiscovered:
                    description: |-
                      LastDiscovered is the timestamp of the most recent successful
                      discovery probe against the server.
                    format: date-time
                    type: string
                  registrationEndpoint:
                    description: |-
                      RegistrationEndpoint is the RFC 7591 dynamic client registration
                      endpoint, when the authorization server supports it.
                    type: string
                  resource:
                    description: |-
                      Resource is the canonical URI of the protected MCP resource, taken
                      from the `resource` field of the RFC 9728 Protected Resource
                      Metadata document.
                    type: string
                  resourceMetadataURL:
                    description: |-
                      ResourceMetadataURL is the `resource_metadata` URL parsed from the
                      server's WWW-Authenticate header (RFC 9728 §5.1).
                    type: string
                  resourceName:
                    description: |-
                      ResourceName is the human-readable name of the protected resource
                      (RFC 9728 `resource_name`), e.g. "Notion MCP (Beta)".
                    type: string
                  scopesSupported:
                    description: |-
                      ScopesSupported is the list of OAuth scopes advertised by the
                      authorization server (RFC 8414 `scopes_supported`).
                    items:
                      type: string
                    type: array
                  state:
                    description: |-
                      State names the current authorization state. Exposed on the
                      MCPServer printcolumn as AUTH. Empty (absent) means the server
                      does not require authorization.
                    enum:
                    - Required
                    - DiscoveryFailed
                    - Authorized
                    type: string
                  tokenEndpoint:
                    description: |-
                      TokenEndpoint is the OAuth 2.1 token endpoint
                      (RFC 8414 `token_endpoint`).
                    type: string
                type: object
              conditions:
                description: Conditions represent the latest available observations
                  of the MCP server's state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              resolvedAddress:
                description: ResolvedAddress contains the actual resolved address
                  value
                type: string
              toolCount:
                description: ToolCount represents the number of tools discovered from
                  this MCP server
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
