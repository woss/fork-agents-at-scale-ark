# DevSpace configuration for ark service
version: v2beta1
name: ark

vars:
  STORAGE_BACKEND:
    source: env
    default: "etcd"

images:
  ark-controller:
    image: ark-controller
    dockerfile: ./Dockerfile
    context: .
  ark-completions:
    image: ark-completions
    dockerfile: ./Dockerfile.completions
    context: .

pipelines:
  deploy: |-
    build_images --all
    if [ "${STORAGE_BACKEND}" == "postgresql" ]; then
      create_deployments ark-storage-dev
      for crd in $(kubectl get crd -o name 2>/dev/null | grep ark.mckinsey.com); do
        kubectl delete "$crd" --wait=false 2>/dev/null || true
        kubectl patch "$crd" -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
      done
      for svc in v1alpha1.ark.mckinsey.com v1prealpha1.ark.mckinsey.com; do
        if kubectl get apiservice "$svc" --no-headers 2>/dev/null; then
          kubectl label apiservice "$svc" app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true
          kubectl annotate apiservice "$svc" meta.helm.sh/release-name=ark-apiserver meta.helm.sh/release-namespace=ark-system --overwrite 2>/dev/null || true
        fi
      done
      create_deployments ark-apiserver
    fi
    create_deployments ark-controller
    create_deployments ark-completions
  dev: |-
    if [ "${STORAGE_BACKEND}" == "postgresql" ]; then
      create_deployments ark-storage-dev
      for crd in $(kubectl get crd -o name 2>/dev/null | grep ark.mckinsey.com); do
        kubectl delete "$crd" --wait=false 2>/dev/null || true
        kubectl patch "$crd" -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
      done
      for svc in v1alpha1.ark.mckinsey.com v1prealpha1.ark.mckinsey.com; do
        if kubectl get apiservice "$svc" --no-headers 2>/dev/null; then
          kubectl label apiservice "$svc" app.kubernetes.io/managed-by=Helm --overwrite 2>/dev/null || true
          kubectl annotate apiservice "$svc" meta.helm.sh/release-name=ark-apiserver meta.helm.sh/release-namespace=ark-system --overwrite 2>/dev/null || true
        fi
      done
      create_deployments ark-apiserver
    fi
    create_deployments ark-controller
    create_deployments ark-completions
    # Pre-create the Go cache PVCs before DevSpace starts dev mode. DevSpace names
    # its own PVCs after the dev container (e.g. ark-controller-devspace) and deletes
    # them on `devspace purge`. By applying these beforehand they are not tracked by
    # DevSpace and therefore survive purge, preserving the Go module and build caches.
    kubectl apply -f hack/dev-pvcs.yaml
    start_dev --all

deployments:
  ark-controller:
    namespace: ark-system
    helm:
      chart:
        path: ./dist/chart
      values:
        controllerManager:
          container:
            image:
              repository: ${runtime.images.ark-controller.image}
              tag: ${runtime.images.ark-controller.tag}
            args:
              - "--leader-elect"
              - "--metrics-bind-address=:8443"
              - "--health-probe-bind-address=:8081"
              - "--completions-addr=http://ark-completions.ark-system"
            resources:
              limits:
                memory: "4096Mi"
                cpu: "2000m"
              requests:
                memory: "512Mi"
                cpu: "200m"
          securityContext:
            runAsNonRoot: false
        webhook:
          enable: true
        completions:
          enabled: false
        telemetry:
          tenantRouting:
            otelDiscovery: true
  ark-completions:
    namespace: ark-system
    helm:
      chart:
        path: ./executors/completions/chart
      releaseName: ark-completions
      values:
        image:
          repository: ${runtime.images.ark-completions.image}
          tag: ${runtime.images.ark-completions.tag}
        resources:
          limits:
            memory: "4096Mi"
            cpu: "2000m"
          requests:
            memory: "512Mi"
            cpu: "200m"
        securityContext:
          runAsNonRoot: false
  ark-apiserver:
    namespace: ark-system
    helm:
      chart:
        path: ./dist/chart-apiserver
      values:
        image:
          repository: ${runtime.images.ark-controller.image}
          tag: ${runtime.images.ark-controller.tag}
        postgresql:
          host: ark-storage-dev
          user: postgres
          passwordSecretName: ark-storage-dev-password

dev:
  ark-controller:
    # On the split branch, ark-apiserver uses the same image as ark-controller, so a
    # bare imageSelector caught both pods and replaced both with the dev container.
    # Match the controller's unique label instead.
    labelSelector:
      control-plane: ark-controller
    devImage: golang:1.24.13-bookworm
    command:
      - "sh"
      - "-c"
      - |
        cd /app
        mkdir -p /go-cache/mod /go-cache/build
        mkdir -p internal/apiserver/crds && cp config/crd/bases/*.yaml internal/apiserver/crds/
        # Redirect module and build caches to /go-cache, which is on a PVC (see
        # persistPaths below). This avoids re-downloading modules and recompiling
        # everything from scratch on every container restart.
        GOMODCACHE=/go-cache/mod GOCACHE=/go-cache/build GOTOOLCHAIN=auto go run cmd/main.go --role=controller --leader-elect=false --completions-addr=http://ark-completions.ark-system
    namespace: ark-system
    logs:
      lastLines: 50
    # Mount a PVC at /go-cache that persists across container restarts.
    # skipPopulate=true means DevSpace does not overwrite the PVC contents when
    # the container starts, so cached modules and build artifacts survive restarts.
    persistPaths:
      - path: /go-cache
        skipPopulate: true
    sync:
      - path: .:/app
        startContainer: true
        disableDownload: true
        uploadExcludeFile: .dockerignore
        onUpload:
          restartContainer: true
    ssh:
      enabled: true
  ark-completions:
    imageSelector: ark-completions
    devImage: golang:1.24.13-bookworm
    command:
      - "sh"
      - "-c"
      # Redirect module and build caches to the persisted PVC (see persistPaths below).
      - "cd /app && mkdir -p /go-cache/mod /go-cache/build && GOMODCACHE=/go-cache/mod GOCACHE=/go-cache/build GOTOOLCHAIN=auto go run cmd/completions/main.go --addr=:9090"
    namespace: ark-system
    logs:
      lastLines: 50
    # Mount a PVC at /go-cache that persists across container restarts.
    # skipPopulate=true means DevSpace does not overwrite the PVC contents when
    # the container starts, so cached modules and build artifacts survive restarts.
    persistPaths:
      - path: /go-cache
        skipPopulate: true
    sync:
      - path: .:/app
        startContainer: true
        disableDownload: true
        uploadExcludeFile: .dockerignore
        onUpload:
          restartContainer: true
    ssh:
      enabled: true

profiles:
  - name: storage-postgresql
    activation:
      - vars:
          STORAGE_BACKEND: "postgresql"
    patches:
      - op: add
        path: deployments.ark-storage-dev
        value:
          namespace: ark-system
          helm:
            chart:
              path: ../charts/ark-storage-dev
            releaseName: ark-storage-dev
      - op: add
        path: deployments.ark-controller.helm.values.storage
        value:
          backend: postgresql
          postgresql:
            host: ark-storage-dev
            port: 5432
            database: ark
            user: postgres
            passwordSecretName: ark-storage-dev-password
      - op: replace
        path: dev.ark-controller.command
        value:
          - "sh"
          - "-c"
          - |
            cd /app
            mkdir -p /go-cache/mod /go-cache/build
            mkdir -p internal/apiserver/crds && cp config/crd/bases/*.yaml internal/apiserver/crds/
            # Redirect caches to the persisted PVC (see dev.ark-controller.persistPaths).
            GOMODCACHE=/go-cache/mod GOCACHE=/go-cache/build GOTOOLCHAIN=auto \
            ARK_STORAGE_BACKEND=postgresql \
            ARK_POSTGRES_HOST=ark-storage-dev.ark-system.svc.cluster.local \
            ARK_POSTGRES_PORT=5432 \
            ARK_POSTGRES_DATABASE=ark \
            ARK_POSTGRES_USER=postgres \
            ARK_POSTGRES_PASSWORD=arkdev123 \
            ARK_POSTGRES_SSL_MODE=disable \
            ARK_APISERVER_PORT=6443 \
            go run cmd/main.go --role=controller --leader-elect=false --completions-addr=http://ark-completions.ark-system
