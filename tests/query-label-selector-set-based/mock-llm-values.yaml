config:
  rules:
  - path: "/v1/models"
    method: "GET"
    response:
      status: 200
      content: |
        {
          "object": "list",
          "data": [
            {
              "id": "gpt-4.1-mini",
              "object": "model",
              "owned_by": "openai"
            }
          ]
        }

  - path: "/v1/chat/completions"
    match: "@"
    response:
      status: 200
      content: |
        {
          "id": "mock-{{timestamp}}",
          "object": "chat.completion",
          "model": "{{jmes request body.model}}",
          "choices": [{
            "message": {
              "role": "assistant",
              "content": "Some specialist knowledge would go here."
            },
            "finish_reason": "stop"
          }],
          "usage": {
            "prompt_tokens": 50,
            "completion_tokens": 20,
            "total_tokens": 70
          }
        }
