apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: query-event-recorder
spec:
  description: Test query event recording during execution lifecycle
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: wait-for-model-ready
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-mock
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'

  - name: run-query
    try:
    - apply:
        file: manifests/*.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: event-recorder-query
        timeout: 60s
        for:
          condition:
            name: Completed
            value: 'True'
    - assert:
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: event-recorder-query
          status:
            (response != null): true
            (response.target.name): 'event-test-agent'
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: event-recorder-query

  - name: validate-events
    try:
    - script:
        env:
        - name: NAMESPACE
          value: ($namespace)
        content: |
          QUERY_UID=$(kubectl get query event-recorder-query -n "$NAMESPACE" -o jsonpath='{.metadata.uid}')
          BROKER_NS=$(kubectl get configmaps --all-namespaces -o json | jq -r '.items[] | select(.metadata.name == "ark-config-broker") | .metadata.namespace' | head -1)
          BROKER_DATA=$(kubectl get configmap ark-config-broker -n "$BROKER_NS" -o json | jq -r '.data.serviceRef')
          BROKER_SVC=$(echo "$BROKER_DATA" | grep '^name:' | sed 's/^name:[[:space:]]*//' | tr -d '"' | tr -d ' ')
          BROKER_PORT=$(echo "$BROKER_DATA" | grep '^port:' | sed 's/^port:[[:space:]]*//' | tr -d '"' | tr -d ' ')
          if [ -z "$BROKER_PORT" ] || [ "$BROKER_PORT" = "http" ]; then BROKER_PORT=80; fi
          BROKER_URL="http://${BROKER_SVC}.${BROKER_NS}.svc.cluster.local:${BROKER_PORT}"

          EXPECTED_REASONS="QueryExecutionStart AgentExecutionStart LLMCallStart LLMCallComplete AgentExecutionComplete QueryExecutionComplete"

          events='[]'
          for attempt in $(seq 1 10); do
            BROKER_RESPONSE=$(kubectl run broker-query-$$ --image=curlimages/curl:8.11.1 --restart=Never --rm -i -n "$NAMESPACE" \
              -- curl -s "$BROKER_URL/events/$QUERY_UID" 2>/dev/null | grep '^{' | sed 's/pod ".*$//')
            events=$(echo "$BROKER_RESPONSE" | jq '.items // []')
            missing=0
            for reason in $EXPECTED_REASONS; do
              count=$(echo "$events" | jq "[.[] | select(.reason == \"$reason\")] | length")
              [ "$count" -gt 0 ] 2>/dev/null || missing=1
            done
            [ "$missing" -eq 0 ] && break
            sleep 2
          done

          check_event() {
            reason=$1
            count=$(echo "$events" | jq "[.[] | select(.reason == \"$reason\")] | length")
            if [ "$count" -gt 0 ] 2>/dev/null; then
              echo "✓ $reason"
            else
              echo "✗ $reason (available: $(echo "$events" | jq -r '.[].reason' | tr '\n' ' '))"
              exit 1
            fi
          }

          check_event "QueryExecutionStart"
          check_event "AgentExecutionStart"
          check_event "LLMCallStart"
          check_event "LLMCallComplete"
          check_event "AgentExecutionComplete"
          check_event "QueryExecutionComplete"
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: event-recorder-query

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
