apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: ark-query-error
spec:
  entrypoint: main
  serviceAccountName: argo-workflow
  templates:
    - name: main
      steps:
        - - name: run
            templateRef:
              name: ark-query
              template: query
            continueOn:
              failed: true
            arguments:
              parameters:
                - name: target
                  value: "agent/broken"
                - name: input
                  value: "Please fail."
                - name: timeout
                  value: "2m"
