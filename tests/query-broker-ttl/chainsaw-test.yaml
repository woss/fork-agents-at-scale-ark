apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: query-broker-ttl
  labels:
    postgresql: "true"
spec:
  description: Query spec.ttl propagates to broker messages; expires_at in Postgres equals created_at + ttl_seconds
  steps:
  - name: setup-mock-llm
    try:
    - script:
        timeout: 180s
        content: |
          bash ../shared/install-mock-llm.sh
        env:
        - name: NAMESPACE
          value: ($namespace)

  - name: wait-for-model-ready
    try:
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Model
        name: test-model-mock
        timeout: 90s
        for:
          condition:
            name: ModelAvailable
            value: 'True'

  - name: run-query-with-ttl
    try:
    - apply:
        file: manifests/a00-rbac.yaml
    - apply:
        file: manifests/a00-memory.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Memory
        name: default
        timeout: 60s
        for:
          jsonPath:
            path: '{.status.lastResolvedAddress}'
    - apply:
        file: manifests/a01-agent.yaml
    - apply:
        file: manifests/a02-query.yaml
    - wait:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: ttl-broker-query
        timeout: 4m
        for:
          jsonPath:
            path: '{.status.response.content}'
    - assert:
        timeout: 1s
        resource:
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            name: ttl-broker-query
          status:
            phase: done
            (response != null): true
    catch:
    - events: {}
    - describe:
        apiVersion: ark.mckinsey.com/v1alpha1
        kind: Query
        name: ttl-broker-query

  - name: verify-ssl-connection
    try:
    - script:
        timeout: 30s
        content: |
          SSL=$(bash ../shared/psql-query.sh \
            "SELECT ssl FROM pg_stat_ssl WHERE pid IN (SELECT pid FROM pg_stat_activity WHERE application_name='postgres.js' AND datname='ark') LIMIT 1;" \
            | tr -d ' \n')
          echo "broker SSL: ${SSL}"
          [ "${SSL}" = "t" ] || { echo "expected ssl=t, got '${SSL}'"; exit 1; }
        env:
        - name: NAMESPACE
          value: ($namespace)
    catch:
    - events: {}

  - name: verify-expires-at-in-postgres
    try:
    - script:
        timeout: 30s
        content: |
          TTL=$(bash ../shared/psql-query.sh \
            "SELECT EXTRACT(EPOCH FROM (expires_at - created_at))::int FROM messages WHERE query_id='ttl-broker-query' LIMIT 1;" \
            | tr -d ' \n')
          echo "DB ttl_seconds: ${TTL}"
          [ "${TTL}" = "3600" ] || { echo "expected 3600, got ${TTL}"; exit 1; }
        env:
        - name: NAMESPACE
          value: ($namespace)
    catch:
    - events: {}

    cleanup:
    - script:
        content: |
          helm uninstall mock-llm --namespace $NAMESPACE --wait --timeout=180s || true
        env:
        - name: NAMESPACE
          value: ($namespace)
