apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: generation-metadata-only
  labels:
    postgresql: "true"
spec:
  description: metadata.generation must only bump when .spec changes.
  steps:
    - name: create-model
      try:
      - script:
          content: |
            set -eu
            cat <<MANIFEST | kubectl apply -n "$NAMESPACE" -f -
            apiVersion: ark.mckinsey.com/v1alpha1
            kind: Model
            metadata:
              name: gen-model
            spec:
              provider: openai
              model:
                value: v1
              config:
                openai:
                  baseUrl:
                    value: https://localhost:9999/v1
                  apiKey:
                    value: k
            MANIFEST
            GEN=$(kubectl get model gen-model -n "$NAMESPACE" -o jsonpath='{.metadata.generation}')
            [ "$GEN" = "1" ] || { echo "FAIL after create: generation=$GEN want 1"; exit 1; }
            echo "OK create: generation=$GEN"
          env:
          - name: NAMESPACE
            value: ($namespace)
          timeout: 30s

    - name: label-only-does-not-bump
      try:
      - script:
          content: |
            set -eu
            kubectl label model gen-model -n "$NAMESPACE" tier=a --overwrite >/dev/null
            GEN=$(kubectl get model gen-model -n "$NAMESPACE" -o jsonpath='{.metadata.generation}')
            [ "$GEN" = "1" ] || { echo "FAIL after label: generation=$GEN want 1"; exit 1; }
            echo "OK label-only: generation=$GEN"
          env:
          - name: NAMESPACE
            value: ($namespace)
          timeout: 30s

    - name: annotation-only-does-not-bump
      try:
      - script:
          content: |
            set -eu
            kubectl annotate model gen-model -n "$NAMESPACE" note=hello --overwrite >/dev/null
            GEN=$(kubectl get model gen-model -n "$NAMESPACE" -o jsonpath='{.metadata.generation}')
            [ "$GEN" = "1" ] || { echo "FAIL after annotate: generation=$GEN want 1"; exit 1; }
            echo "OK annotation-only: generation=$GEN"
          env:
          - name: NAMESPACE
            value: ($namespace)
          timeout: 30s

    - name: spec-change-bumps
      try:
      - script:
          content: |
            set -eu
            kubectl patch model gen-model -n "$NAMESPACE" --type=merge \
              -p '{"spec":{"model":{"value":"v2"}}}' >/dev/null
            GEN=$(kubectl get model gen-model -n "$NAMESPACE" -o jsonpath='{.metadata.generation}')
            [ "$GEN" = "2" ] || { echo "FAIL after spec change: generation=$GEN want 2"; exit 1; }
            echo "OK spec change: generation=$GEN"
          env:
          - name: NAMESPACE
            value: ($namespace)
          timeout: 30s

    - name: same-spec-does-not-bump
      try:
      - script:
          content: |
            set -eu
            # Re-send an identical spec via merge patch. jsonb structural equality
            # means the OLD spec = NEW spec, so generation must stay at 2.
            kubectl patch model gen-model -n "$NAMESPACE" --type=merge \
              -p '{"spec":{"model":{"value":"v2"}}}' >/dev/null
            GEN=$(kubectl get model gen-model -n "$NAMESPACE" -o jsonpath='{.metadata.generation}')
            [ "$GEN" = "2" ] || { echo "FAIL after identical spec: generation=$GEN want 2"; exit 1; }
            echo "OK same spec: generation=$GEN"
          env:
          - name: NAMESPACE
            value: ($namespace)
          timeout: 30s

    - name: first-deletion-mark-bumps
      try:
      - script:
          content: |
            set -eu
            # Finalizer keeps the row alive so `kubectl delete` only marks it. The
            # deletionTimestamp transition (null → set) must bump generation, matching
            # upstream rest.BeforeDelete.
            kubectl patch model gen-model -n "$NAMESPACE" --type=merge \
              -p '{"metadata":{"finalizers":["ark.mckinsey.com/test"]}}' >/dev/null
            kubectl delete model gen-model -n "$NAMESPACE" --wait=false >/dev/null
            GEN=$(kubectl get model gen-model -n "$NAMESPACE" -o jsonpath='{.metadata.generation}')
            DT=$(kubectl get model gen-model -n "$NAMESPACE" -o jsonpath='{.metadata.deletionTimestamp}')
            [ -n "$DT" ] || { echo "FAIL: deletionTimestamp not set"; exit 1; }
            [ "$GEN" = "3" ] || { echo "FAIL after first delete: generation=$GEN want 3"; exit 1; }
            echo "OK first delete mark: generation=$GEN deletionTimestamp=$DT"
          env:
          - name: NAMESPACE
            value: ($namespace)
          timeout: 30s
      cleanup:
      - script:
          content: |
            kubectl patch model gen-model -n "$NAMESPACE" --type=merge \
              -p '{"metadata":{"finalizers":[]}}' >/dev/null 2>&1 || true
            kubectl delete model gen-model -n "$NAMESPACE" --ignore-not-found >/dev/null 2>&1 || true
          env:
          - name: NAMESPACE
            value: ($namespace)
