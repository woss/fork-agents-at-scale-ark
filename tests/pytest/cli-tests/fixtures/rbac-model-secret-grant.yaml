apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rbac-demo-model-secret
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: ["ark.mckinsey.com"]
    resources: ["models", "queries", "teams"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rbac-demo-model-secret
  namespace: default
subjects:
  - kind: Group
    name: rbac-demo-group
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: rbac-demo-model-secret
  apiGroup: rbac.authorization.k8s.io
