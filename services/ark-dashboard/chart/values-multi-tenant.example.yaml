# Example values for hosting one tenant of a multi-tenant Ark dashboard under
# a path prefix on a shared domain (e.g. mydomain.com/namespace1/).
#
# Apply this file per tenant:
#   helm install ark-dashboard-ns1 ./chart \
#     -f values-multi-tenant.example.yaml \
#     --set app.config.basePath=/namespace1 \
#     --set app.config.arkApiService.host=ark-api.namespace1.svc.cluster.local \
#     --namespace namespace1
#
# Repeat per tenant namespace, with each tenant's prefix and ark-api host.

app:
  config:
    basePath: /namespace1
    arkApiService:
      host: ark-api.namespace1.svc.cluster.local
      port: "80"
      protocol: http
  env:
    # Auth callback URLs must include the tenant prefix or OIDC callbacks
    # redirect to the wrong tenant.
    - name: BASE_URL
      value: https://mydomain.com/namespace1
    - name: AUTH_URL
      value: https://mydomain.com/namespace1/api/auth
    - name: AUTH_MODE
      value: open
    # NOTE: if you front these tenants with a separate ark-landing-page login
    # hub on a DIFFERENT origin, that hub must set AUTH_ALLOWED_CALLBACK_ORIGINS
    # to include this tenant's origin (see the ark-landing-page chart values),
    # or the post-login redirect back to the tenant is silently dropped.

# The dashboard chart installs a per-tenant Ingress that captures only this
# tenant's prefix. The cluster operator is responsible for installing the
# matching ark-api Ingress (or using a single shared Ingress) that routes
# /namespace1/api/v1/* to the namespace1 ark-api with prefix-strip:
#
#   nginx.ingress.kubernetes.io/rewrite-target: /v1/$1
#   path: /namespace1/api/v1/(.*)
#   pathType: ImplementationSpecific
#
# See the multi-tenant hosting guide in docs/ for the full Ingress example.
ingress:
  enabled: true
  className: nginx
  annotations:
    # SSO dashboards emit a large response header after login (the chunked
    # NextAuth session Set-Cookie). nginx-ingress's default proxy buffer
    # (4k/8k) is too small and the tenant returns 502 "upstream sent too big
    # header" on the post-login request. Enlarge the buffer. 16k is enough for
    # a chunked session cookie; raise further if you add large custom claims.
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
  hosts:
    - host: mydomain.com
      paths:
        - path: /namespace1
          pathType: Prefix

httpRoute:
  enabled: false
