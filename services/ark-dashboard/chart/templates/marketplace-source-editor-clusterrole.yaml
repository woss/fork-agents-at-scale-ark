{{- if .Values.marketplaceSourceEditorRole.create }}
# Grants edit access to the marketplace-sources ConfigMap. The default install
# binds this to no one — platform teams bind it per namespace with a RoleBinding
# (see samples/marketplace/marketplace-source-editor-binding.yaml).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: marketplace-source-editor
  labels:
    app: {{ .Values.app.name }}
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["marketplace-sources"]
    verbs: ["get", "update", "patch"]
{{- end }}
