# DevSpace configuration for ark-dashboard service
version: v2beta1

images:
  ark-dashboard:
    image: ark-dashboard
    dockerfile: Dockerfile
    context: .
    docker:
      useBuildKit: true

pipelines:
  deploy: |-
    build_images --all
    create_deployments --all
  dev: |-
    create_deployments --all

    # Patch deployment to add PVCs for node modules and the npm cache
    kubectl patch deployment ark-dashboard -n ${DEVSPACE_NAMESPACE:-default} --type=strategic -p \
      '{"spec":{"template":{"spec":{"volumes":[{"name":"node-modules","persistentVolumeClaim":{"claimName":"ark-dashboard-node-modules"}},{"name":"npm-cache","persistentVolumeClaim":{"claimName":"ark-dashboard-npm-cache"}}],"containers":[{"name":"ark-dashboard","volumeMounts":[{"name":"node-modules","mountPath":"/app/ark-dashboard/node_modules"},{"name":"npm-cache","mountPath":"/npm-cache"}]}]}}}}' || true

    start_dev --all

deployments:
  ark-dashboard:
    namespace: default
    helm:
      chart:
        path: ./chart
      values:
        app:
          image:
            repository: ${runtime.images.ark-dashboard.image}
            tag: ${runtime.images.ark-dashboard.tag}
          # Override resources for local development
          resources:
            limits:
              memory: "6144Mi"
              cpu: "2000m"
            requests:
              memory: "256Mi"
              cpu: "200m"
          # Override security context for dev mode to allow DevSpace sync
          podSecurityContext:
            runAsNonRoot: false
            runAsUser: 0
            fsGroup: 0
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            capabilities:
              add:
                - SETUID
                - SETGID
                - CHOWN
                - FOWNER
                - DAC_OVERRIDE
        httpRoute:
          enabled: true
        extraPVCs:
          - name: ark-dashboard-node-modules
            size: 2Gi
          - name: ark-dashboard-npm-cache
            size: 2Gi

dev:
  ark-dashboard:
    imageSelector: ark-dashboard
    devImage: node:24-alpine
    env:
      - name: NODE_ENV
        value: development
      - name: npm_config_cache
        value: /npm-cache
    command:
      [
        "sh",
        "-c",
        "cd /app/ark-dashboard && npm install --prefer-offline --no-audit --no-fund && npm run dev 2>&1",
      ]
    namespace: default
    # Stream logs instead of terminal
    logs:
      lastLines: 50
    # File synchronization for hot reload
    sync:
      - path: .:/app
        startContainer: true
        disableDownload: true
        uploadExcludeFile: .dockerignore
        excludePaths:
          - ark-dashboard/node_modules/
    # Enable SSH for IDE integration
    ssh:
      enabled: true

