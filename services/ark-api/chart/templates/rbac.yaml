{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.serviceAccount.name }}-role
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
rules:
  # Core resources for Helm releases and events.
  # MCP auth endpoints (/api/v1/mcp-servers/{name}/auth/start|callback|logout)
  # write OAuth tokens to the Secret named in spec.authorization.tokenSecretRef
  # and require get/create/update/patch/delete on secrets in the served
  # namespaces. list/watch are not required for the auth endpoints.
  - apiGroups: [""]
    resources: ["secrets", "events"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Permission to read configmaps to load ark-config-streaming configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  # Permission to write export history to a dedicated configmap
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["ark-export-metadata"]
    verbs: ["update", "patch"]
  # Permission to read services to get the address of the configured streaming service
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  # Permission to read pods and pod logs for workflow log fetching
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  # Gateway API resources
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "gateways"]
    verbs: ["get", "list"]
  # Ark resources.
  # MCP auth endpoints use get/update on mcpservers to read
  # status.authorization and stamp authorized-by/authorized-at annotations.
  - apiGroups: ["ark.mckinsey.com"]
    resources: ["models", "agents", "queries", "teams", "tools", "workflows", "arktemplates", "mcpservers", "a2aservers", "memories", "a2atasks", "executionengines"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Argo Workflows resources
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates", "cronworkflows", "clusterworkflowtemplates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.serviceAccount.name }}-binding
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Values.serviceAccount.name }}-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.serviceAccount.name }}-cluster-role-{{ .Release.Namespace }}
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
rules:
  # Cluster-scoped Ark resources (singleton ArkConfig for global defaults)
  - apiGroups: ["ark.mckinsey.com"]
    resources: ["arkconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Marketplace-sources permission probe issues a SelfSubjectAccessReview
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
  {{- if .Values.impersonation.enabled }}
  # User impersonation for SSO-authenticated requests (must be cluster-scoped)
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
  {{- end }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.serviceAccount.name }}-cluster-binding-{{ .Release.Namespace }}
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.serviceAccount.name }}-cluster-role-{{ .Release.Namespace }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}