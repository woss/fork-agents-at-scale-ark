# DevSpace configuration for ark-api service
version: v2beta1

images:
  ark-api:
    image: ark-api
    dockerfile: Dockerfile
    context: .
  ark-api-dev:
    image: ark-api-dev
    dockerfile: Dockerfile.dev
    context: .
    buildKit: {}

dependencies:
  ark-sdk:
    path: ../../lib/ark-sdk

pipelines:
  deploy: |-
    run_dependency_pipelines --all --pipeline=deploy
    ./sync-ark-sdk.sh
    build_images --all
    create_deployments --all
  dev: |-
    run_dependency_pipelines --all --pipeline=dev
    ./sync-ark-sdk.sh
    build_images ark-api-dev
    create_deployments --all
    start_dev --all

deployments:
  ark-api:
    namespace: default
    helm:
      chart:
        path: ./chart
      values:
        app:
          image:
            repository: ${runtime.images.ark-api.image}
            tag: ${runtime.images.ark-api.tag}
          # Override resources for local development
          resources:
            limits:
              memory: "1024Mi"
              cpu: "1000m"
            requests:
              memory: "256Mi"
              cpu: "200m"
          # Override security context for dev mode to allow DevSpace sync
          podSecurityContext:
            runAsNonRoot: false
            runAsUser: 0
            fsGroup: 0
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            capabilities:
              add:
                - SETUID
                - SETGID
                - CHOWN
                - FOWNER
                - DAC_OVERRIDE
        httpRoute:
          enabled: true

dev:
  ark-api:
    imageSelector: ark-api
    devImage: ${runtime.images.ark-api-dev.image}:${runtime.images.ark-api-dev.tag}
    command:
      [
        "sh",
        "-c",
        "cd /app/ark-api && uv sync --frozen && uv run uvicorn ark_api.main:app --host 0.0.0.0 --port 8000 --reload",
      ]
    namespace: default
    # Forward the OAuth callback loopback port so dashboard-driven MCP auth
    # reaches ark-api without a manual port-forward. Matches the loopback
    # literal in ARK_API_PUBLIC_CALLBACK_URL, which strict IdPs accept.
    ports:
      - port: 34780:8000
    # Stream logs instead of terminal
    logs:
      lastLines: 50
    # File synchronization for hot reload
    sync:
      - path: .:/app
        startContainer: true
        disableDownload: true
        uploadExcludeFile: .dockerignore
      - path: ./out:/app/ark-api/out/
        startContainer: true
        disableDownload: true
        onUpload:
          restartContainer: true
      - path: ../../ark:/workspace
        excludePaths:
          - bin/
          - out/
          - .git/
    # Enable SSH for IDE integration
    ssh:
      enabled: true

