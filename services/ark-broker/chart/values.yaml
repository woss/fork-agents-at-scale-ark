# ARK Broker chart values

# Message backend: memory (default) or postgres
# Event backend: memory (default) or postgres
# Chunk backend: memory (default) or redis
backends:
  message: memory
  event: memory
  chunk: memory

# PostgreSQL connection — required when backends.message=postgres
database:
  # Plain connection URL. Avoid in production — use urlSecretRef instead.
  url: ""

  # URL used only by the migrate init container. Falls back to database.url when not set.
  # Use this when the migrate URL needs extra parameters that the app URL must not have,
  # e.g. sslrootcert= (golang-migrate reads it as a client-side path; postgres.js sends
  # it as a GUC SET command, which PostgreSQL rejects).
  migrateUrl: ""

  # Reference a k8s Secret that holds the full DATABASE_URL.
  # When set, takes priority over database.url in both the app and the migrate init container.
  urlSecretRef:
    name: ""
    key: "database-url"

  # Mount a k8s Secret containing TLS certificates into both the app container
  # and the migrate init container. Required for sslmode=verify-ca / verify-full.
  # Set sslmode in DATABASE_URL, e.g.: ?sslmode=verify-full
  # The CA cert is loaded automatically from <mountPath>/ca.crt via DATABASE_SSL_ROOT_CERT_PATH.
  tls:
    enabled: false
    secretName: ""
    mountPath: /etc/pg-ssl

  poolMax: 10
  connectTimeoutMs: 10000
  statementTimeoutMs: 30000
  messageVisibilityTtlSeconds: 2592000
  eventVisibilityTtlSeconds: 2592000
  debugQueries: false

# Redis connection — required when backends.chunk=redis
redis:
  # Plain connection URL. Avoid in production — use urlSecretRef instead.
  url: ""

  # Reference a k8s Secret that holds the full REDIS_URL.
  # When set, takes priority over redis.url.
  urlSecretRef:
    name: ""
    key: "redis-url"

  # Reference a k8s Secret for REDIS_PASSWORD (optional, for ACL auth).
  passwordSecretRef:
    name: ""
    key: "redis-password"

  # Mount a k8s Secret containing TLS certificates.
  # Set url to rediss:// scheme when TLS is enabled.
  tls:
    enabled: false
    secretName: ""
    mountPath: /etc/redis-ssl

  keyPrefix: "ark-broker"
  streamTtlSeconds: 3600
  connectTimeoutMs: 10000
  debugCommands: false

# Migration init container image — used when backends.message=postgres
migrate:
  image:
    repository: ghcr.io/mckinsey/agents-at-scale-ark/ark-broker-migrate
    tag: ""
    pullPolicy: IfNotPresent

# Global annotations added to all resources
global:
  annotations:
    ark.mckinsey.com/service: ark-broker

# Application configuration
app:
  name: ark-broker
  image:
    repository: ghcr.io/mckinsey/agents-at-scale-ark/ark-broker
    # tag defaults to .Chart.AppVersion if not specified
    pullPolicy: IfNotPresent

  # Resource configuration
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1024Mi"
      cpu: "1000m"

server:
  requestTimeout: 0

replicaCount: 1

service:
  type: ClusterIP
  port: 80

# Memory service configuration
memory:
  # Create a Memory CRD resource
  createMemoryCRD: true
  # Set this Memory as the default (names it "default")
  setAsDefault: true
  # Port for the HTTP server
  port: 8080

# Store limits (0 = unlimited)
# Each store persists to JSON. Limits prevent unbounded file growth.
# Estimates: messages ~2KB, chunks ~500B, spans ~1KB, events ~500B each
limits:
  # Max messages to persist (~100MB at 50k messages)
  maxMessages: 50000
  # Max stream chunks to persist (~100MB at 200k chunks)
  maxChunks: 200000
  # Max trace spans to persist (~100MB at 100k spans)
  maxSpans: 100000
  # Max events to persist (~100MB at 200k events)
  maxEvents: 200000

# Streaming configuration
streaming:
  # Enable streaming support via ConfigMap (creates 'ark-config-streaming' when enabled)
  enabled: true

# Persistence configuration
persistence:
  enabled: false
  # Storage class for the PVC (uses default if not specified)
  storageClass: ""
  # Access mode for the PVC
  accessMode: ReadWriteOnce
  # Size of the persistent volume
  size: 1Gi
  # Path where data will be stored
  mountPath: /data
  # Filename for the memory data
  memoryFileName: messages.json
  # Filename for the stream data
  streamFileName: completionchunks.json
  # Filename for the trace data
  traceFileName: oteltraces.json
  # Filename for the event data
  eventFileName: events.json
  # Filename for the sessions data
  sessionsFileName: sessions.json
  # Use existing PVC instead of creating a new one
  existingClaim: ""

serviceAccount:
  create: true
  name: ""

# L2 FIX: Pod security context for hardening
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

# L2 FIX: Container security context for hardening
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector: {}

tolerations: []

affinity: {}

# OTEL endpoint configuration - registers this broker as an OTEL trace receiver
# When enabled, creates a ConfigMap that the ARK controller discovers when processing queries
otelEndpoint:
  enabled: true

# Controller restart hook - ensures ark-controller restarts after broker deployment
# to discover the broker's OTEL endpoint
restartController:
  enabled: true
  namespace: ark-system
