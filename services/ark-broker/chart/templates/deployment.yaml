apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ark-broker.fullname" . }}
  labels:
    {{- include "ark-broker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ark-broker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ark-broker.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ark-broker.serviceAccountName" . }}
      {{- if eq .Values.backends.message "postgres" }}
      initContainers:
        - name: migrate
          image: "{{ .Values.migrate.image.repository }}:{{ .Values.migrate.image.tag | default .Values.app.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.migrate.image.pullPolicy }}
          args: ["-path", "/migrations", "-database", "$(DATABASE_URL)", "up"]
          env:
            - name: DATABASE_URL
              {{- if .Values.database.urlSecretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.urlSecretRef.name }}
                  key: {{ .Values.database.urlSecretRef.key | default "database-url" }}
              {{- else if .Values.database.migrateUrl }}
              value: {{ .Values.database.migrateUrl | quote }}
              {{- else }}
              value: {{ .Values.database.url | quote }}
              {{- end }}
          {{- if .Values.database.tls.enabled }}
          volumeMounts:
            - name: pg-tls
              mountPath: {{ .Values.database.tls.mountPath }}
              readOnly: true
          {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.memory.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.memory.port | quote }}
            - name: REQUEST_TIMEOUT_MS
              value: {{ .Values.server.requestTimeout | quote }}
            {{- if .Values.limits.maxMessages }}
            - name: MAX_MESSAGES
              value: {{ .Values.limits.maxMessages | quote }}
            {{- end }}
            {{- if .Values.limits.maxChunks }}
            - name: MAX_CHUNKS
              value: {{ .Values.limits.maxChunks | quote }}
            {{- end }}
            {{- if .Values.limits.maxSpans }}
            - name: MAX_SPANS
              value: {{ .Values.limits.maxSpans | quote }}
            {{- end }}
            {{- if .Values.limits.maxEvents }}
            - name: MAX_EVENTS
              value: {{ .Values.limits.maxEvents | quote }}
            {{- end }}
            - name: MESSAGE_BACKEND
              value: {{ .Values.backends.message | quote }}
            {{- if eq .Values.backends.message "postgres" }}
            - name: DATABASE_URL
              {{- if .Values.database.urlSecretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.urlSecretRef.name }}
                  key: {{ .Values.database.urlSecretRef.key | default "database-url" }}
              {{- else }}
              value: {{ .Values.database.url | quote }}
              {{- end }}
            - name: DATABASE_POOL_MAX
              value: {{ .Values.database.poolMax | quote }}
            - name: DATABASE_CONNECT_TIMEOUT_MS
              value: {{ .Values.database.connectTimeoutMs | quote }}
            - name: DATABASE_STATEMENT_TIMEOUT_MS
              value: {{ .Values.database.statementTimeoutMs | quote }}
            - name: MESSAGE_VISIBILITY_TTL_SECONDS
              value: {{ .Values.database.visibilityTtlSeconds | int | quote }}
            {{- if .Values.database.debugQueries }}
            - name: DATABASE_DEBUG_QUERIES
              value: "true"
            {{- end }}
            {{- if .Values.database.tls.enabled }}
            - name: DATABASE_SSL_ROOT_CERT_PATH
              value: {{ printf "%s/ca.crt" .Values.database.tls.mountPath | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: MEMORY_FILE_PATH
              value: "{{ .Values.persistence.mountPath }}/{{ .Values.persistence.memoryFileName }}"
            - name: STREAM_FILE_PATH
              value: "{{ .Values.persistence.mountPath }}/{{ .Values.persistence.streamFileName }}"
            - name: TRACE_FILE_PATH
              value: "{{ .Values.persistence.mountPath }}/{{ .Values.persistence.traceFileName }}"
            - name: EVENT_FILE_PATH
              value: "{{ .Values.persistence.mountPath }}/{{ .Values.persistence.eventFileName }}"
            - name: SESSIONS_FILE_PATH
              value: "{{ .Values.persistence.mountPath }}/{{ .Values.persistence.sessionsFileName }}"
            {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.database.tls.enabled }}
            - name: pg-tls
              mountPath: {{ .Values.database.tls.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          {{- if .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "ark-broker.fullname" . }}-data
          {{- end }}
        {{- end }}
        {{- if .Values.database.tls.enabled }}
        - name: pg-tls
          secret:
            secretName: {{ required "database.tls.secretName is required when database.tls.enabled=true" .Values.database.tls.secretName }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
