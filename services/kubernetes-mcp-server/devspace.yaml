version: v2beta1

pipelines:
  deploy: |-
    create_deployments --all
  dev: |-
    create_deployments --all

deployments:
  kubernetes-mcp-server:
    namespace: default
    helm:
      chart:
        name: oci://ghcr.io/containers/charts/kubernetes-mcp-server
        version: 0.1.0
      values:
        config:
          read_only: true
        ingress:
          enabled: false
        httpRoute:
          enabled: true
          parentRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: localhost-gateway
              namespace: ark-system
              sectionName: http-wildcard
          hostnames:
            - kubernetes-mcp-server.127.0.0.1.nip.io
        rbac:
          create: true
          extraRoles:
            - name: ark-reader
              namespace: default
              rules:
                - apiGroups: ["ark.mckinsey.com"]
                  resources:
                    - agents
                    - teams
                    - queries
                    - models
                    - mcpservers
                    - a2aservers
                    - a2atasks
                    - tools
                    - memories
                    - executionengines
                    - arkconfigs
                  verbs: ["get", "list", "watch"]
          extraRoleBindings:
            - name: ark-reader
              namespace: default
              roleRef:
                name: ark-reader
  kubernetes-mcp-server-ark:
    namespace: default
    kubectl:
      manifests:
        - manifests/mcpserver.yaml
