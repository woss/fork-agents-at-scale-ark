version: 2

updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: '.github/workflows'
    commit-message:
      prefix: 'chore(actions): '
    schedule:
      interval: weekly
    open-pull-requests-limit: 1

  # Terraform
  - package-ecosystem: "terraform"
    directories:
      - "infrastructure/providers/aws"
      - "infrastructure/providers/gcp"
    commit-message:
      prefix: 'chore(terraform): '
    schedule:
      interval: weekly
    open-pull-requests-limit: 1

  # NPM - ark-broker
  - package-ecosystem: "npm"
    directory: "services/ark-broker/ark-broker"
    commit-message:
      prefix: 'chore(npm): '
    schedule:
      interval: weekly
    open-pull-requests-limit: 1

  # NPM - ark-dashboard
  - package-ecosystem: "npm"
    directory: "services/ark-dashboard"
    commit-message:
      prefix: 'chore(npm): '
    schedule:
      interval: weekly
    open-pull-requests-limit: 1

  # NPM - docs
  - package-ecosystem: "npm"
    directory: "docs"
    commit-message:
      prefix: 'chore(npm): '
    schedule:
      interval: weekly
    open-pull-requests-limit: 1

  # Go modules
  - package-ecosystem: "gomod"
    directories:
      - "ark"
      - "tools/fark"
    commit-message:
      prefix: 'chore(go): '
    schedule:
      interval: weekly
    open-pull-requests-limit: 1

  # Python (uv)
  - package-ecosystem: "uv"
    directories:
      - "services/ark-api/ark-api"
      - "services/ark-mcp/ark-mcp"
      - "lib/ark-sdk"
      - "lib/ark-sdk/gen_sdk/overlay/python"
    commit-message:
      prefix: 'chore(python): '
    schedule:
      interval: weekly
    open-pull-requests-limit: 1

  # Docker - scan for base image updates
  - package-ecosystem: "docker"
    directories:
      - "services/ark-api"
      - "services/ark-broker/ark-broker"
      - "services/ark-dashboard"
      - "services/ark-mcp"
    commit-message:
      prefix: 'chore(docker): '
    schedule:
      interval: weekly
    open-pull-requests-limit: 1