name: Build docs

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - docs/**
      - ark/config/crd/bases/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Concurrency is per-workflow, per-pull request or branch, similar to the regular CICD pipeline.
# This pattern does *not* apply to the 'main' branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-docs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build Docs
        run: |
          cd docs
          npm ci
          npm i pagefind @pagefind/linux-x64 && npm run build
        env:
          # Set basePath for GitHub Pages deployment using configurable variable
          NEXT_PUBLIC_BASE_PATH: ${{ vars.DOCS_SITE_BASE_PATH || '' }}

      - name: Validate Ark YAML in Docs
        run: npm run validate-yaml
        working-directory: docs

      - name: Validate Internal Documentation Links
        run: |
          # Rebuild docs without base path for link checking
          echo "Rebuilding docs without base path for link validation..."
          npm run build
          echo "Checking for broken links..."
          npm run check-links
        working-directory: docs

      - name: Upload Site Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out
