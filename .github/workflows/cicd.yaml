name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'samples/**'
      - 'openspec/**'
      - '**.md'
  workflow_dispatch:

# Release please will create pull requests, update the changelog, and cicd will
# deploy the docs and modules and create tags and labels.
permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  issues: write
  packages: write
  # Required to trigger the 'deploy' workflow when a release is created.
  actions: write

# Concurrency is per-workflow, per-pull request or branch. This means that
# existing workflows are *only* cancelled if someone pushes a new commit to the
# same pull request or branch (which only triggers for 'main' in this workflow).
# People therefore cannot cancel each others' build, only cancel pending builds
# on their own PRs.
# This pattern does *not* apply to the 'main' branch - which we want to always
# have the full pipeline run on.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CHAINSAW_VERSION: v0.2.15

jobs:
  # Setup job to determine container cache registry
  setup-container-cache-registry:
    runs-on: ubuntu-24.04
    outputs:
      ci-cache-registry: ${{ steps.setup-registry.outputs.ci-cache-registry }}
      ci-cache-registry-hostname: ${{ steps.setup-registry.outputs.ci-cache-registry-hostname }}
      is-fork-pr: ${{ steps.setup-registry.outputs.is-fork-pr }}
    steps:
      - uses: actions/checkout@v6

      - id: setup-registry
        uses: ./.github/actions/setup-container-cache-registry
        with:
          docker-cicd-cache-registry: ${{ vars.DOCKER_CICD_CACHE_REGISTRY }}
  # Code quality scan with SonarQube
  sonar_scan:
    needs: [build-and-test-ark, build-and-test-services]
    uses: ./.github/workflows/sonar_scan.yaml
    secrets: inherit

  # Security scan with JFrog Xray
  jfrog-xray-scan:
    runs-on: ubuntu-latest
    env:
      XRAY_WATCH_NAME: 'ark-20863-security-watch'
      SCAN_JSON: "xray-scan-agents-at-scale-${{ github.run_number }}.json"
    steps:
      - uses: actions/checkout@v6

      - name: Materialize embedded CRDs for Go scan
        shell: bash
        run: |
          mkdir -p ark/internal/apiserver/crds
          cp ark/config/crd/bases/*.yaml ark/internal/apiserver/crds/

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.21"

      - name: Export uv lockfiles to requirements.txt for Xray
        shell: bash
        run: |
          # jf audit only reads requirements.txt for Python; without this it
          # resolves uv projects fresh from PyPI and misses the locked versions.
          # --no-sources skips [tool.uv.sources] overrides (e.g. local ark-sdk
          # wheels built later in the pipeline) so the export works at checkout.
          # Failures fall back to jf audit's pre-existing pyproject.toml mode
          # for that one project — no worse than today — so don't fail the job.
          set +e
          for dir in services/ark-api/ark-api \
                     services/ark-mcp/ark-mcp \
                     lib/ark-sdk \
                     lib/ark-sdk/gen_sdk/overlay/python \
                     templates/tool; do
            if [ ! -f "$dir/uv.lock" ]; then
              echo "Skipping $dir (no uv.lock)"
              continue
            fi
            echo "Exporting $dir"
            err=$( (cd "$dir" && uv export --format requirements-txt --no-hashes --no-dev --no-sources > requirements.txt) 2>&1 )
            if [ $? -ne 0 ]; then
              echo "::warning::uv export failed for $dir, jf audit will fall back to scanning pyproject.toml as pip: ${err//$'\n'/ | }"
            fi
          done
          exit 0

      - name: Run JFrog Xray scan
        id: xray-scan
        uses: ./.github/actions/jfrog-xray-scan
        with:
          github_repo: ${{ github.repository }}
          build_name: 'agents-at-scale'
          build_number: ${{ github.run_number }}
          watch_name: ${{ env.XRAY_WATCH_NAME }}
          jfrog_user: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_USERNAME }}
          jfrog_password: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_PASSWORD }}
          jfrog_url: ${{ vars.JFROG_PLATFORM_URL }}
        
      - name: Get last vulnarability report from the main branch run
        if: always()
        shell: bash
        run: |
          GITHUB_REPOSITORY="${{ github.repository }}"
          LAST_RUN_ID=$(gh api "/repos/$GITHUB_REPOSITORY/actions/workflows/cicd.yaml/runs?branch=main&status=success&per_page=1" | jq -c '.workflow_runs[0].id')
          
          echo "Downloading artifacts from run ID: $LAST_RUN_ID"
          gh run download "$LAST_RUN_ID" --repo "$GITHUB_REPOSITORY" --pattern "xray-scan-results-agents-at-scale-*" --dir ./artifacts
          cp ./artifacts/**/xray-scan-agents-at-scale-*.json ./last-main-scan.json
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Detect new violations
        if: always()
        shell: bash
        run: |
          WHITELIST=".github/actions/jfrog-xray-scan/tolerated_violations.txt"

          echo "Comparing with last scan file: ./last-main-scan.json"

          echo "New violations since last scan:"
          jq -r '.[].violations[]?.issue_id' "./last-main-scan.json" > old.txt
          jq -r '.[].violations[]?.issue_id' "$SCAN_JSON" > new.txt

          NEW_VIOLATIONS=$(comm -13 <(sort old.txt) <(sort new.txt))
          REMOVED_VIOLATIONS=$(comm -13 <(sort new.txt) <(sort old.txt))

          FAIL=0

          if [ -n "$NEW_VIOLATIONS" ]; then
            echo "New violations found:"
            echo "$NEW_VIOLATIONS"

            echo "Checking new violations against whitelist..."
            FILTERED_VIOLATIONS=""
            while read -r violation; do
              if grep -q "$violation" "$WHITELIST"; then
                echo "Whitelisted violation (skipping): $violation"
              else
                echo "New violation not whitelisted: $violation"
                FILTERED_VIOLATIONS="${FILTERED_VIOLATIONS}${violation}"$'\n'
                FAIL=1
              fi
            done <<< "$NEW_VIOLATIONS"
            NEW_VIOLATIONS="$FILTERED_VIOLATIONS"

            # Export only unwhitelisted violations for use in next step
            if [ -n "$NEW_VIOLATIONS" ]; then
              echo "NEW_VIOLATIONS<<EOF" >> $GITHUB_ENV
              printf '%s' "$NEW_VIOLATIONS" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
            fi

            if [ "$FAIL" -eq 1 ]; then
              echo "❌ Failing due to unwhitelisted new violations."
              exit 1
            fi
          elif [ -n "$REMOVED_VIOLATIONS" ]; then
            echo "The following violations were eliminated: $REMOVED_VIOLATIONS."
          else
            echo "No new violations found."
          fi

      - name: Create GitHub issue for new CVE violations
        if: always() && env.NEW_VIOLATIONS != ''
        uses: ./.github/actions/create-cve-issues
        with:
          new_violations: ${{ env.NEW_VIOLATIONS }}
          scan_json: ${{ env.SCAN_JSON }}  

  # Build and test Ark itself.
  build-and-test-ark:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
          cache-dependency-path: |
            ark/go.sum
            tools/fark/go.sum

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: "3.18.6"

      - name: Install gcov2lcov
        run: go install github.com/jandelgado/gcov2lcov@latest

      - name: Run tests
        run: cd ark && make test

      - name: Run linting
        run: cd ark && make lint

      - name: Build binary
        run: cd ark && make build
      
      - name: Generate LCOV from Go coverage
        run: |
          mkdir -p ark/unit-tests
          cp ark/cover.out ark/unit-tests/
          cd ark && gcov2lcov -infile unit-tests/cover.out -outfile unit-tests/lcov.info
      
      - uses: ./.github/actions/collect-coverage
        with:
          source-path: ark/unit-tests/
          artifact-folder: ark/unit-tests
          artifact-suffix: ark-unit

  build-and-test-services:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
          cache-dependency-path: |
            ark/go.sum
            tools/fark/go.sum

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.21"

      - name: Install ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.12.2"
          args: "--version"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: make -j24 services-build-all

      - name: Check generated types are unchanged
        run: |
          # Now fail the CI if the generated file differs from committed
          if ! git diff --exit-code services/ark-dashboard/ark-dashboard/lib/api/generated/types.ts; then
            echo "Error: Generated types.ts file has changed. Please regenerate and commit the changes."
            exit 1
          fi

      - run: make -j24 services-test-all
      
      - uses: ./.github/actions/collect-coverage
        with:
          source-path: services/ark-api/ark-api/coverage/
          artifact-folder: ark-api/unit-tests
          artifact-suffix: ark-api-unit

      - uses: ./.github/actions/collect-coverage
        with:
          source-path: services/ark-dashboard/ark-dashboard/coverage/
          artifact-folder: ark-dashboard/unit-tests
          artifact-suffix: ark-dashboard-unit

  build-containers:
    needs: [setup-container-cache-registry, build-libs]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: ark
            image: ark-controller
          - path: ark
            image: ark-completions
            dockerfile: Dockerfile.completions
          - path: services/ark-api
            image: ark-api
            install-uv: true
            prebuild: "make ark-api-deps && mkdir -p services/ark-api/ark-api/out && cp out/ark-sdk/py-sdk/dist/ark_sdk-*.whl services/ark-api/ark-api/out/"
          - path: services/ark-dashboard
            image: ark-dashboard
            install-uv: true
            prebuild: "make ark-dashboard-deps"
          - path: services/ark-broker/ark-broker
            image: ark-broker
          - path: services/ark-broker/ark-broker
            image: ark-broker-migrate
            dockerfile: Dockerfile.migrate
          - path: services/ark-mcp
            image: ark-mcp
            install-uv: true
            prebuild: "make ark-mcp-deps && mkdir -p services/ark-mcp/ark-mcp/out && cp out/ark-sdk/py-sdk/dist/ark_sdk-*.whl services/ark-mcp/ark-mcp/out/"
          - path: tools/ark-cli
            image: ark-cli
            prebuild: "make ark-cli-build"
          - path: images/ark-tools
            image: ark-tools
            prebuild: "make ark-cli-build && cp -r tools ark images/ark-tools/"

    steps:
      - uses: actions/checkout@v6

      - name: Download library artifacts
        uses: actions/download-artifact@v8
        with:
          name: out-libs-${{ github.sha }}
          path: out/

      - name: Install uv
        if: matrix.install-uv
        uses: astral-sh/setup-uv@v7
        with:
          # Pinned to match the Dockerfile uv version and to skip setup-uv's
          # "find latest" GitHub API lookup, which has stalled CI for minutes.
          version: "0.11.21"

      - name: Login to Docker Registry
        if: ${{ needs.setup-container-cache-registry.outputs.is-fork-pr == 'false' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry-hostname }}
          username: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/build-image
        with:
          path: ${{ matrix.path }}
          image: ${{ matrix.image }}
          tag: ${{ github.sha }}
          registry: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}
          platforms: linux/amd64
          push: true
          prebuild: ${{ matrix.prebuild }}
          dockerfile: ${{ matrix.dockerfile || 'Dockerfile' }}

  xray-container-scan:
    needs: [setup-container-cache-registry, build-containers]
    if: ${{ needs.setup-container-cache-registry.outputs.is-fork-pr == 'false' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - ark-controller
          - ark-completions
          - ark-api
          - ark-dashboard
          - ark-broker
          - ark-broker-migrate
          - ark-mcp
          - ark-cli
          - ark-tools
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry-hostname }}
          username: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/jfrog-xray-container-scan
        with:
          image: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}/${{ matrix.image }}:${{ github.sha }}
          image_name: ${{ matrix.image }}
          jfrog_user: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_USERNAME }}
          jfrog_password: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_PASSWORD }}
          jfrog_url: ${{ vars.JFROG_PLATFORM_URL }}

  build-libs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.21"

      - name: Build libraries
        run: make libs-build-all

      - name: Test libraries
        run: make libs-test-all

      - name: Upload library artifacts
        uses: actions/upload-artifact@v7
        with:
          name: out-libs-${{ github.sha }}
          path: out/
          retention-days: 30

  e2e-ark-cli:
    needs: [setup-container-cache-registry, build-containers, build-ark-cli]
    if: ${{ needs.setup-container-cache-registry.outputs.is-fork-pr == 'false' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/test-ark-cli
        with:
          azure-openai-key: ${{ secrets.CICD_AZURE_OPENAI_KEY != '' && secrets.CICD_AZURE_OPENAI_KEY || 'xxxxxxxxxxx' }}
          azure-openai-base-url: ${{ secrets.CICD_AZURE_OPENAI_BASE_URL != '' &&  secrets.CICD_AZURE_OPENAI_BASE_URL || 'http://mock-llm.default.svc.cluster.local/v1' }}
          model-type: ${{ secrets.CICD_AZURE_OPENAI_BASE_URL && 'azure' || 'openai' }}
          model-name: ${{ secrets.CICD_AZURE_OPENAI_BASE_URL && 'gpt-4.1-mini' || 'gpt-4' }}
          model-api-version: 2024-12-01-preview
          ci-cache-registry: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}
          ci-cache-registry-hostname: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry-hostname }}
          ci-cache-registry-username: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_USERNAME || github.actor }}
          ci-cache-registry-password: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}
          ark-image-tag: ${{ github.sha }}
          is-fork-pr: ${{ needs.setup-container-cache-registry.outputs.is-fork-pr }}

  e2e-smoke-test:
    needs: [setup-container-cache-registry, build-containers]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e
        with:
          ark-image-tag: ${{ github.sha }}
          install-coverage: "false"
          ci-cache-registry: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}
          ci-cache-registry-username: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_USERNAME || github.actor }}
          ci-cache-registry-password: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Deploy localhost-gateway
        run: |
          echo "=== Deploying localhost-gateway ==="
          # Install nginx-gateway-fabric CRDs (not handled by setup-e2e)
          kubectl apply -f https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v2.0.2/deploy/crds.yaml
          helm upgrade --install localhost-gateway services/localhost-gateway/chart \
            --namespace ark-system \
            --create-namespace \
            --wait \
            --timeout=10m
          
          # Wait for gateway to be ready
          echo "=== Waiting for gateway to be ready ==="
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=nginx-gateway-fabric -n ark-system --timeout=120s
          kubectl wait --for=condition=Programmed gateway/localhost-gateway -n ark-system --timeout=120s

      - name: Deploy ark-api
        run: |
          echo "=== Deploying ark-api ==="
          helm upgrade --install ark-api services/ark-api/chart \
            --namespace default \
            --create-namespace \
            --set app.image.repository="${{ needs.setup-container-cache-registry.outputs.ci-cache-registry || format('ghcr.io/{0}/{1}', github.repository_owner, github.event.repository.name) }}/ark-api" \
            --set app.image.tag="${{ github.sha }}" \
            --set app.image.pullPolicy="Always" \
            --wait \
            --timeout=5m

      - name: Deploy ark-dashboard
        run: |
          echo "=== Deploying dashboard ==="
          helm upgrade --install ark-dashboard services/ark-dashboard/chart \
            --namespace default \
            --create-namespace \
            --set app.image.repository="${{ needs.setup-container-cache-registry.outputs.ci-cache-registry || format('ghcr.io/{0}/{1}', github.repository_owner, github.event.repository.name) }}/ark-dashboard" \
            --set app.image.tag="${{ github.sha }}" \
            --set app.image.pullPolicy="Always" \
            --wait \
            --timeout=5m

      - name: Verify deployment
        run: |
          echo "=== Checking deployment status ==="
          echo "ARK Controller:"
          kubectl get pods -n ark-system -l control-plane=ark-controller || echo "Controller not found, showing all ark-system pods:" && kubectl get pods -n ark-system
          echo "ARK Services:"
          kubectl get pods -n default -l app=ark-api
          kubectl get pods -n default -l app=ark-dashboard
          echo "Service endpoints:"
          kubectl get svc -n default ark-api ark-dashboard

      - name: Test endpoints
        run: |
          # Wait for pods to exist
          echo "Waiting for pods to be scheduled..."
          kubectl wait --for=condition=ready pod -l app=ark-api -n default --timeout=120s || true
          kubectl wait --for=condition=ready pod -l app=ark-dashboard -n default --timeout=120s || true

          # Test ark-api service
          echo
          echo "=== Testing ark-api service ==="
          for i in $(seq 1 30); do
            # Kill any existing port-forward on 8082
            pkill -f "port-forward.*8082:80" 2>/dev/null || true
            sleep 1

            # Start fresh port-forward
            kubectl port-forward -n default service/ark-api 8082:80 &
            sleep 3

            if curl -sf --connect-timeout 5 --max-time 10 http://127.0.0.1:8082/health > /dev/null 2>&1; then
              echo "ark-api is ready (attempt $i/30)"
              break
            fi

            echo "Waiting for ark-api... ($i/30)"
            if [ $i -eq 30 ]; then
              echo "ark-api failed to become ready"
              kubectl logs -l app=ark-api -n default --tail=50
              exit 1
            fi
          done

          echo "Testing API endpoints..."
          curl -f --max-time 10 http://127.0.0.1:8082/health || (echo "API health check failed" && kubectl logs -l app=ark-api -n default --tail=20 && exit 1)
          curl -f --max-time 10 http://127.0.0.1:8082/ready || (echo "API ready check failed" && kubectl logs -l app=ark-api -n default --tail=20 && exit 1)
          curl -f --max-time 10 http://127.0.0.1:8082/v1/agents/ || (echo "Agents list endpoint failed" && kubectl logs -l app=ark-api -n default --tail=20 && exit 1)
          curl -f --max-time 10 http://127.0.0.1:8082/a2a/agents || (echo "A2A /agents endpoint failed" && kubectl logs -l app=ark-api -n default --tail=20 && exit 1)
          echo "ark-api tests passed!"

          # Test ark-dashboard service
          echo
          echo "=== Testing ark-dashboard service ==="
          for i in $(seq 1 30); do
            # Kill any existing port-forward on 3001
            pkill -f "port-forward.*3001:3000" 2>/dev/null || true
            sleep 1

            # Start fresh port-forward
            kubectl port-forward -n default service/ark-dashboard 3001:3000 &
            sleep 3

            if curl -sf --connect-timeout 5 --max-time 10 http://127.0.0.1:3001/ > /dev/null 2>&1; then
              echo "ark-dashboard is ready (attempt $i/30)"
              break
            fi

            echo "Waiting for ark-dashboard... ($i/30)"
            if [ $i -eq 30 ]; then
              echo "ark-dashboard failed to become ready"
              kubectl logs -l app=ark-dashboard -n default --tail=50
              exit 1
            fi
          done

          echo "Testing dashboard endpoint..."
          curl -f --max-time 10 http://127.0.0.1:3001/ || (echo "Dashboard check failed" && kubectl logs -l app=ark-dashboard -n default --tail=20 && exit 1)
          echo "ark-dashboard tests passed!"

          # Cleanup
          pkill -f "port-forward" 2>/dev/null || true
          echo "Smoke test completed successfully!"


  e2e-tests-standard:
    name: E2E Standard (${{ matrix.storage-backend }})
    needs: [setup-container-cache-registry, build-containers]
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.storage-backend == 'postgresql' }}
    strategy:
      fail-fast: false
      matrix:
        storage-backend: [etcd, postgresql]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e
        with:
          ark-image-tag: ${{ github.sha }}
          install-coverage: "true"
          install-broker: "true"
          storage-backend: ${{ matrix.storage-backend }}
          prefetch-test-images: "true"
          ci-cache-registry: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}
          ci-cache-registry-username: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_USERNAME || github.actor }}
          ci-cache-registry-password: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Install chainsaw
        run: |
          curl -s -L "https://github.com/kyverno/chainsaw/releases/download/${{ env.CHAINSAW_VERSION }}/chainsaw_linux_amd64.tar.gz" | \
            tar xz -C /tmp
          sudo mv /tmp/chainsaw /usr/local/bin/chainsaw
          sudo chmod +x /usr/local/bin/chainsaw

      - name: Run standard E2E tests
        env:
          E2E_TEST_AZURE_OPENAI_KEY: ${{ secrets.CICD_AZURE_OPENAI_KEY != '' && secrets.CICD_AZURE_OPENAI_KEY || 'xxxxxxxxxxx' }}
          E2E_TEST_AZURE_OPENAI_BASE_URL: ${{ secrets.CICD_AZURE_OPENAI_BASE_URL != '' &&  secrets.CICD_AZURE_OPENAI_BASE_URL || 'http://mock-llm.default.svc.cluster.local/v1' }}
          ARK_BROKER_IMAGE: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry || format('ghcr.io/{0}/{1}', github.repository_owner, github.event.repository.name) }}/ark-broker
          ARK_BROKER_IMAGE_TAG: ${{ github.sha }}
          ARK_MCP_IMAGE: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry || format('ghcr.io/{0}/{1}', github.repository_owner, github.event.repository.name) }}/ark-mcp
          ARK_MCP_IMAGE_TAG: ${{ github.sha }}
          ARK_DASHBOARD_IMAGE: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry || format('ghcr.io/{0}/{1}', github.repository_owner, github.event.repository.name) }}/ark-dashboard
          ARK_DASHBOARD_IMAGE_TAG: ${{ github.sha }}
        run: |
          cd tests
          mkdir -p /tmp/chainsaw-report
          if [ "${{ matrix.storage-backend }}" = "etcd" ]; then
            chainsaw test --config .chainsaw.yaml --selector '!llm,!postgresql'
          else
            chainsaw test --config .chainsaw.yaml --selector '!llm,!etcd-only'
          fi

      - name: Collect cluster logs
        if: always()
        run: kubectl cluster-info dump --all-namespaces --output-directory=/tmp/cluster-logs

      - name: Upload cluster logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cluster-logs-standard-${{ matrix.storage-backend }}-${{ github.sha }}
          path: /tmp/cluster-logs
          retention-days: 7

      - uses: ./.github/actions/collect-coverage-e2e
        with:
          artifact-name: coverage-reports-standard-${{ matrix.storage-backend }}

  e2e-tests-llm:
    name: E2E LLM (${{ matrix.storage-backend }})
    needs: [setup-container-cache-registry, build-containers]
    runs-on: ubuntu-24.04
    if: ${{ needs.setup-container-cache-registry.outputs.is-fork-pr == 'false' }}
    continue-on-error: ${{ matrix.storage-backend == 'postgresql' }}
    strategy:
      fail-fast: false
      matrix:
        storage-backend: [etcd, postgresql]
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e
        with:
          ark-image-tag: ${{ github.sha }}
          install-coverage: "true"
          storage-backend: ${{ matrix.storage-backend }}
          prefetch-test-images: "true"
          ci-cache-registry: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}
          ci-cache-registry-username: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_USERNAME || github.actor }}
          ci-cache-registry-password: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Install chainsaw and jq
        run: |
          curl -s -L "https://github.com/kyverno/chainsaw/releases/download/${{ env.CHAINSAW_VERSION }}/chainsaw_linux_amd64.tar.gz" | \
            tar xz -C /tmp
          sudo mv /tmp/chainsaw /usr/local/bin/chainsaw
          sudo chmod +x /usr/local/bin/chainsaw
          sudo apt-get update && sudo apt-get install -y jq

      - name: Warm up network connectivity
        env:
          AZURE_BASE_URL: ${{ secrets.CICD_AZURE_OPENAI_BASE_URL }}
          OPENAI_BASE_URL: ${{ secrets.CICD_OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
        run: |
          echo "Warming up egress network paths to LLM providers..."
          for i in {1..5}; do
            echo "Attempt $i:"
            azure_ok=1
            if [ -n "$AZURE_BASE_URL" ]; then
              azure_ok=0
              if curl -s -m 10 -o /dev/null "$AZURE_BASE_URL"; then
                echo "✓ Azure OpenAI reachable"
                azure_ok=1
              else
                echo "✗ Azure OpenAI unreachable (will retry)"
              fi
            fi
            openai_ok=0
            if curl -s -m 10 -o /dev/null "$OPENAI_BASE_URL"; then
              echo "✓ OpenAI reachable"
              openai_ok=1
            else
              echo "✗ OpenAI unreachable (will retry)"
            fi
            if [ "$azure_ok" = 1 ] && [ "$openai_ok" = 1 ]; then
              echo "Network warm-up complete - LLM providers reachable"
              break
            fi
            sleep 3
          done

      - name: Run multi-provider LLM tests
        env:
          E2E_TEST_AZURE_OPENAI_KEY: ${{ secrets.CICD_AZURE_OPENAI_KEY }}
          E2E_TEST_AZURE_OPENAI_BASE_URL: ${{ secrets.CICD_AZURE_OPENAI_BASE_URL }}
          E2E_TEST_AZURE_OPENAI_API_VERSION: ${{ secrets.CICD_AZURE_OPENAI_API_VERSION || '2024-12-01-preview' }}
          E2E_TEST_OPENAI_API_KEY: ${{ secrets.CICD_OPENAI_API_KEY }}
          E2E_TEST_OPENAI_BASE_URL: ${{ secrets.CICD_OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
          ARK_CLUSTER_MEMORY_IMAGE: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry || format('ghcr.io/{0}/{1}', github.repository_owner, github.event.repository.name) }}/ark-cluster-memory
          ARK_CLUSTER_MEMORY_IMAGE_TAG: ${{ github.sha }}
        run: |
          cd tests
          chmod +x llm-tests/run-multi-provider.sh
          ./llm-tests/run-multi-provider.sh

      - name: Collect cluster logs
        if: always()
        run: kubectl cluster-info dump --all-namespaces --output-directory=/tmp/cluster-logs

      - name: Upload cluster logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cluster-logs-llm-${{ matrix.storage-backend }}-${{ github.sha }}
          path: /tmp/cluster-logs
          retention-days: 7

      - uses: ./.github/actions/collect-coverage-e2e
        with:
          artifact-name: coverage-reports-llm-${{ matrix.storage-backend }}

  e2e-ui-tests:
    needs: [setup-container-cache-registry, build-containers]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e
        with:
          ark-image-tag: ${{ github.sha }}
          install-coverage: "false"
          install-broker: "true"
          ci-cache-registry: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}
          ci-cache-registry-username: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_USERNAME || github.actor }}
          ci-cache-registry-password: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Deploy ark-api
        run: |
          helm upgrade --install ark-api services/ark-api/chart \
            --namespace default \
            --create-namespace \
            --set app.image.repository="${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}/ark-api" \
            --set app.image.tag="${{ github.sha }}" \
            --set app.image.pullPolicy="Always" \
            --wait \
            --timeout=5m

      - name: Deploy ark-dashboard
        run: |
          helm upgrade --install ark-dashboard services/ark-dashboard/chart \
            --namespace default \
            --create-namespace \
            --set app.image.repository="${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}/ark-dashboard" \
            --set app.image.tag="${{ github.sha }}" \
            --set app.image.pullPolicy="Always" \
            --wait \
            --timeout=5m

      - name: Wait for services to be ready
        run: |
          kubectl wait --for=condition=ready pod -l app=ark-api -n default --timeout=120s
          kubectl wait --for=condition=ready pod -l app=ark-dashboard -n default --timeout=120s
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=ark-broker -n default --timeout=120s

      - name: Update Argo Workflows dependencies
        run: |
          cd services/argo-workflows/chart
          helm dependency update
          cd ../../..

      - name: Deploy Argo Workflows
        run: |
          helm upgrade --install argo-workflows services/argo-workflows/chart \
            --namespace default \
            --create-namespace \
            --set minio.enabled=false \
            --wait \
            --timeout=5m

      - name: Wait for Argo Workflows to be ready
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=argo-workflows-server -n default --timeout=120s
          kubectl wait --for=condition=ready pod -l app=workflow-controller -n default --timeout=120s

      - name: Configure Argo Workflows RBAC
        run: |
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: argo-workflow
            namespace: default
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: argo-workflow-extended
          rules:
          - apiGroups: [""]
            resources: ["pods", "pods/log"]
            verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
          - apiGroups: ["argoproj.io"]
            resources: ["workflows", "workflows/finalizers", "workflowtemplates", "workflowtaskresults"]
            verbs: ["get", "list", "watch", "update", "patch", "create", "delete"]
          - apiGroups: ["ark.mckinsey.com"]
            resources: ["queries", "models", "agents"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argo-workflow-extended-binding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: argo-workflow-extended
          subjects:
          - kind: ServiceAccount
            name: argo-workflow
            namespace: default
          EOF

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: tests/pytest/ui-tests/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('tests/pytest/ui-tests/requirements.txt') }}

      - name: Install UI test dependencies
        run: |
          cd tests/pytest/ui-tests
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Install mock-llm
        run: |
          for resource in deployment service serviceaccount configmap role rolebinding secret; do
            kubectl delete $resource mock-llm -n default --ignore-not-found
          done
          for resource in clusterrole clusterrolebinding; do
            kubectl delete $resource mock-llm --ignore-not-found
          done
          helm upgrade --install mock-llm oci://ghcr.io/dwmkerr/charts/mock-llm \
            --version 0.1.28 \
            --namespace default \
            --values tests/pytest/ui-tests/mock-llm-values.yaml \
            --wait --timeout=120s

      - name: Start port-forwarding
        run: |
          kubectl port-forward svc/ark-dashboard 3274:3000 &
          kubectl port-forward svc/argo-workflows-server 8081:2746 &
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://localhost:3274 || echo "Dashboard connectivity check"

      - name: Run UI tests
        run: |
          cd tests/pytest/ui-tests
          mkdir -p screenshots
          pytest tests/ -n 4 --dist loadgroup -v --tb=short --log-cli-level=INFO

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-screenshots-${{ github.sha }}
          path: tests/pytest/ui-tests/screenshots/
          retention-days: 7

      - name: Collect cluster logs
        if: always()
        run: kubectl cluster-info dump --all-namespaces --output-directory=/tmp/cluster-logs

      - name: Upload cluster logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cluster-logs-ui-${{ github.sha }}
          path: /tmp/cluster-logs
          retention-days: 7

  e2e-cli-tests:
    needs: [setup-container-cache-registry, build-containers]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e
        with:
          ark-image-tag: ${{ github.sha }}
          install-coverage: "false"
          install-broker: "true"

          ci-cache-registry: ${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}
          ci-cache-registry-username: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_USERNAME || github.actor }}
          ci-cache-registry-password: ${{ secrets.DOCKER_CICD_CACHE_REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build and install ark-cli
        run: |
          cd tools/ark-cli
          npm ci
          npm run build
          npm install -g .

      - name: Deploy ark-api
        run: |
          helm upgrade --install ark-api services/ark-api/chart \
            --namespace default \
            --create-namespace \
            --set app.image.repository="${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}/ark-api" \
            --set app.image.tag="${{ github.sha }}" \
            --set app.image.pullPolicy="Always" \
            --wait \
            --timeout=5m

      - name: Deploy ark-mcp
        run: |
          helm upgrade --install ark-mcp services/ark-mcp/chart \
            --namespace default \
            --create-namespace \
            --set app.image.repository="${{ needs.setup-container-cache-registry.outputs.ci-cache-registry }}/ark-mcp" \
            --set app.image.tag="${{ github.sha }}" \
            --set app.image.pullPolicy="Always" \
            --wait \
            --timeout=5m

      - name: Wait for services to be ready
        run: |
          kubectl wait --for=condition=available -n ark-system --timeout=300s deployment/ark-controller
          kubectl wait --for=condition=ready pod -l app=ark-api -n default --timeout=120s
          kubectl wait --for=condition=ready pod -l app=ark-mcp -n default --timeout=120s

      - name: Deploy localhost-gateway
        run: |
          kubectl apply -f https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v2.0.2/deploy/crds.yaml
          helm upgrade --install localhost-gateway services/localhost-gateway/chart \
            --namespace ark-system \
            --create-namespace \
            --wait \
            --timeout=10m
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=nginx-gateway-fabric -n ark-system --timeout=120s
          kubectl wait --for=condition=Programmed gateway/localhost-gateway -n ark-system --timeout=120s

      - name: Install mock-llm
        run: |
          for resource in deployment service serviceaccount configmap role rolebinding secret; do
            kubectl delete $resource mock-llm -n default --ignore-not-found
          done
          for resource in clusterrole clusterrolebinding; do
            kubectl delete $resource mock-llm --ignore-not-found
          done
          helm upgrade --install mock-llm oci://ghcr.io/dwmkerr/charts/mock-llm \
            --version 0.1.28 \
            --namespace default \
            --values tests/pytest/cli-tests/mock-llm-values.yaml \
            --wait --timeout=120s

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install CLI test dependencies
        run: |
          pip install -r tests/pytest/ui-tests/requirements.txt

      - name: Run CLI tests
        env:
          PYTHONPATH: ${{ github.workspace }}/tests/pytest/cli-tests
        run: |
          cd tests/pytest/cli-tests/tests
          pytest . -n 3 --dist loadscope -v --tb=short --log-cli-level=INFO

      - name: Upload CLI test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cli-test-logs-${{ github.sha }}
          path: tests/pytest/cli-tests/tests/*.log
          retention-days: 7

      - name: Collect cluster logs
        if: always()
        run: kubectl cluster-info dump --all-namespaces --output-directory=/tmp/cluster-logs

      - name: Upload cluster logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cluster-logs-cli-${{ github.sha }}
          path: /tmp/cluster-logs
          retention-days: 7

  build-charts:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        chart:
          # Package only the essential charts.
          - { name: ark-controller, path: ark/dist/chart }
          - { name: ark-apiserver, path: ark/dist/chart-apiserver }
          - { name: ark-completions, path: ark/executors/completions/chart }
          - { name: ark-api, path: services/ark-api/chart }
          - { name: ark-dashboard, path: services/ark-dashboard/chart }
          - { name: ark-mcp, path: services/ark-mcp/chart }
          - { name: ark-broker, path: services/ark-broker/chart }
          - { name: localhost-gateway, path: services/localhost-gateway/chart }
          - { name: ark-tenant, path: charts/ark-tenant }
          - { name: argo-workflows, path: services/argo-workflows/chart }
    steps:
      - uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: "3.14.0"

      - name: Lint and Package ${{ matrix.chart.name }}
        run: |
          cd ${{ matrix.chart.path }}
          helm dependency update
          helm lint .
          helm package .

      - name: Upload ${{ matrix.chart.name }} Chart
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.chart.name }}-${{ github.sha }}
          path: ${{ matrix.chart.path }}/${{ matrix.chart.name }}-*.tgz
          retention-days: 30

  build-ark-cli:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build ARK CLI
        run: |
          cd tools/ark-cli
          npm ci
          npm run build

      - name: Run tests and collect coverage
        run: |
          cd tools/ark-cli
          npm test

      - uses: ./.github/actions/collect-coverage
        with:
          source-path: tools/ark-cli/artifacts/coverage/
          artifact-folder: ark-cli/unit-tests
          artifact-suffix: ark-cli-unit

      - name: Create NPM package tarball
        run: |
          cd tools/ark-cli
          # Create a tarball that can be installed with npm install
          npm pack

          # Create output directory
          mkdir -p ../../out

          # Move the tarball to a standard location
          mv agents-at-scale-ark-*.tgz ../../out/ark-cli.tgz

          echo "Created installable ark-cli package:"
          ls -la ../../out/ark-cli.tgz

      - name: Upload ARK CLI Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ark-cli-${{ github.sha }}
          path: out/ark-cli.tgz
          retention-days: 30

  report-coverage:
    needs:
      [
        build-containers,
        e2e-smoke-test,
        e2e-tests-standard,

        e2e-ui-tests,
        e2e-cli-tests,
        build-and-test-ark,
        build-and-test-services,
        build-charts,
        build-ark-cli,
      ]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go for coverage tools
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          # Coverage tooling only; no project build, so module caching has no value here.
          cache: false

      - name: Install Python coverage tools
        run: |
          python -m pip install --upgrade pip
          pip install coverage

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-artifacts

      - name: Generate coverage report
        run: |
          echo "=== Coverage Report Summary ==="
          echo

          # Enumerate through all coverage artifacts
          for artifact_dir in coverage-artifacts/*; do
            if [ -d "$artifact_dir" ]; then
              artifact_name=$(basename "$artifact_dir")
              echo "$artifact_name:"

              # Check for Go coverage files
              if find "$artifact_dir" -name "*.out" | grep -q .; then
                coverage_file=$(find "$artifact_dir" -name "*.out" | head -1)
                echo "  Processing Go coverage file: $(basename "$coverage_file")"
                go tool cover -func="$coverage_file" 2>/dev/null | tail -1 || echo "  Go coverage processing failed (best effort)"
              # Check for Python coverage files
              elif find "$artifact_dir" -name ".coverage" | grep -q .; then
                coverage_file=$(find "$artifact_dir" -name ".coverage" | head -1)
                coverage_dir=$(dirname "$coverage_file")
                (cd "$coverage_dir" && coverage report --show-missing) || echo "  Python coverage report failed"
              else
                echo "  No recognized coverage files found"
              fi
              echo
            fi
          done

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage-artifacts
          fail_ci_if_error: false
          verbose: true
          flags: ark-cli,combined-coverage

  check-release:
    needs:
      [
        build-containers,
        e2e-smoke-test,
        e2e-tests-standard,

        e2e-ui-tests,
        e2e-cli-tests,
        e2e-ark-cli,
        e2e-tests-llm,
        jfrog-xray-scan,
        xray-container-scan,
        build-and-test-ark,
        build-and-test-services,
        build-charts,
        build-ark-cli,
      ]
    runs-on: ubuntu-24.04
    outputs:
      released: ${{ steps.release-please.outputs.release_created }}
      tag: ${{ steps.release-please.outputs.tag_name }}
      release_type: ${{ steps.release-type.outputs.type }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Skip Release (Running Locally)
        if: ${{ env.ACT }}
        run: |
          echo "ℹ️  Skipping release when running locally with 'act'"
          echo "   Release creation requires GitHub tokens that are not available locally"

      - name: Determine release type
        id: release-type
        if: ${{ !env.ACT && github.ref == 'refs/heads/main' }}
        run: |
          VERSION=$(jq -r '."."' .github/release-please-manifest.json)

          # Extract base version (remove -rc or -rc.* suffix if present)
          BASE_VERSION="${VERSION%-rc*}"

          echo "Manifest version: $VERSION"
          echo "Base version: $BASE_VERSION"

          # Promotion scenario:
          # 1. Manifest version is stable (no -rc suffix)
          # 2. RC tags exist for this version (v0.1.60-rc*)
          # 3. Stable tag doesn't exist yet (v0.1.60)
          RC_TAGS=$(git tag --list "v${BASE_VERSION}-rc*" | head -1)
          STABLE_TAG=$(git tag --list "v${BASE_VERSION}" | head -1)

          echo "RC tags for v${BASE_VERSION}: $RC_TAGS"
          echo "Stable tag v${BASE_VERSION}: $STABLE_TAG"

          if [[ "$VERSION" != *-rc* && -n "$RC_TAGS" && -z "$STABLE_TAG" ]]; then
            echo "config=.github/release-please-config.json" >> $GITHUB_OUTPUT
            echo "type=stable" >> $GITHUB_OUTPUT
            echo "release_as=${BASE_VERSION}" >> $GITHUB_OUTPUT
            echo "Promotion detected: RC tags exist for v${BASE_VERSION}, releasing stable"
          else
            echo "config=.github/release-please-config-rc.json" >> $GITHUB_OUTPUT
            echo "type=rc" >> $GITHUB_OUTPUT
            echo "Normal development flow, using RC config"
          fi

      - name: Create Release
        if: ${{ !env.ACT && github.ref == 'refs/heads/main' }}
        uses: googleapis/release-please-action@v4
        id: release-please
        with:
          manifest-file: .github/release-please-manifest.json
          config-file: ${{ steps.release-type.outputs.config || '.github/release-please-config-rc.json' }}
          target-branch: main
          release-as: ${{ steps.release-type.outputs.release_as || '' }}

  release-libs:
    needs: [check-release]
    runs-on: ubuntu-24.04
    if: ${{ needs.check-release.outputs.released && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Download library artifacts
        uses: actions/download-artifact@v8
        with:
          name: out-libs-${{ github.sha }}
          path: ./

      - name: Attach libraries to release
        run: |
          RELEASE_TAG="${{ needs.check-release.outputs.tag }}"
          echo "Attaching libraries to release: $RELEASE_TAG"

          # List what we downloaded
          echo "Files in out directory:"
          find . -type f -name "*.whl" || echo "No .whl files found"

          # Upload wheel files with their original names (versions already embedded)
          find . -name "*.whl" -type f | while read wheel; do
            if [ -f "$wheel" ]; then
              filename=$(basename "$wheel")
              echo "Uploading $wheel as $filename"
              gh release upload "$RELEASE_TAG" "$wheel" || { echo "Failed to upload $wheel"; exit 1; }
            fi
          done
        env:
          GH_TOKEN: ${{ github.token }}


  release-charts:
    needs: [check-release]
    runs-on: ubuntu-24.04
    if: ${{ needs.check-release.outputs.released && github.ref == 'refs/heads/main' }}
    strategy:
      matrix:
        chart:
          - ark-controller
          - ark-apiserver
          - ark-completions
          - ark-api
          - ark-dashboard
          - ark-mcp
          - ark-broker
          - localhost-gateway
          - ark-tenant
          - argo-workflows
    steps:
      - uses: actions/checkout@v6

      - name: Download ${{ matrix.chart }} artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.chart }}-${{ github.sha }}
          path: ./

      - name: Attach ${{ matrix.chart }} to release
        run: |
          RELEASE_TAG="${{ needs.check-release.outputs.tag }}"
          gh release upload "$RELEASE_TAG" ${{ matrix.chart }}-*.tgz
        env:
          GH_TOKEN: ${{ github.token }}

  release-ark-cli:
    needs: [check-release]
    runs-on: ubuntu-24.04
    if: ${{ needs.check-release.outputs.released && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6

      - name: Download ark-cli artifact
        uses: actions/download-artifact@v8
        with:
          name: ark-cli-${{ github.sha }}
          path: ./

      - name: Attach ark-cli to release
        run: |
          RELEASE_TAG="${{ needs.check-release.outputs.tag }}"
          echo "Attaching ark-cli to release: $RELEASE_TAG"

          # List what we downloaded
          echo "ARK CLI files:"
          ls -la ark-cli.tgz || echo "No ark-cli package found"

          # Upload ark-cli tarball to release
          if [ -f "ark-cli.tgz" ]; then
            echo "Uploading ark-cli.tgz"
            gh release upload "$RELEASE_TAG" "ark-cli.tgz" || echo "Failed to upload ark-cli.tgz (may already exist)"
            echo "✅ ark-cli package attached to release"
          else
            echo "❌ ark-cli.tgz not found"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  release-fark:
    needs: [check-release]
    runs-on: ubuntu-24.04
    if: ${{ needs.check-release.outputs.released && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Needed for goreleaser changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          # goreleaser builds tools/fark; cache against its go.sum.
          cache-dependency-path: tools/fark/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=publish
          workdir: ./tools/fark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ needs.check-release.outputs.tag }}

      - name: Upload fark binaries to release
        run: |
          RELEASE_TAG="${{ needs.check-release.outputs.tag }}"
          echo "Attaching fark binaries to release: $RELEASE_TAG"

          # Upload all generated archives
          find ./tools/fark/dist -name "*.tar.gz" -o -name "*.zip" | while read archive; do
            echo "Uploading $(basename "$archive")"
            gh release upload "$RELEASE_TAG" "$archive" --clobber
          done

          # Upload checksums file
          if [ -f "./tools/fark/dist/checksums.txt" ]; then
            gh release upload "$RELEASE_TAG" "./tools/fark/dist/checksums.txt" --clobber
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  run-deploy-workflow:
    needs: [check-release]
    runs-on: ubuntu-24.04
    if: ${{ needs.check-release.outputs.released && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Trigger Deploy workflow for release
        run: |
          if [[ "${{ needs.check-release.outputs.release_type }}" == "stable" ]]; then
            IS_STABLE=true
          else
            IS_STABLE=false
          fi

          gh workflow run deploy.yml \
            --field ark_version="${{ needs.check-release.outputs.tag }}" \
            --field deploy_containers=true \
            --field deploy_containers_to_latest=${IS_STABLE} \
            --field deploy_to_pages=${IS_STABLE} \
            --field deploy_to_npm=${IS_STABLE} \
            --field deploy_helm_chart=true \
            --field deploy_to_pypi=${IS_STABLE}
        env:
          GH_TOKEN: ${{ github.token }}

  verify-ark-installation:
    needs: [check-release, release-charts, release-ark-cli]
    runs-on: ubuntu-24.04
    if: ${{ needs.check-release.outputs.released && github.ref == 'refs/heads/main' && needs.check-release.outputs.release_type == 'stable' }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-k3s
        with:
          metrics-enabled: false
          traefik-enabled: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install published ark-cli from npm
        run: |
          RELEASE_TAG="${{ needs.check-release.outputs.tag }}"
          echo "Installing ark-cli@${RELEASE_TAG} from npm registry..."
          npm install -g @agents-at-scale/ark@${RELEASE_TAG}
          ark --version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: |
          pip install -r tests/pytest/ui-tests/requirements.txt

      - name: Run complete ARK workflow installation test
        env:
          PYTHONPATH: ${{ github.workspace }}/tests/pytest
        run: |
          cd tests/pytest
          pytest test_complete_ark_workflow.py -v --tb=short

      - name: Upload verification test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ark-installation-verification-logs-${{ github.sha }}
          path: tests/pytest/*.log
          retention-days: 7

  bootstrap-next-rc-cycle:
    needs: [check-release]
    runs-on: ubuntu-24.04
    if: ${{ needs.check-release.outputs.released && needs.check-release.outputs.release_type == 'stable' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Calculate next version
        id: next-version
        run: |
          TAG="${{ needs.check-release.outputs.tag }}"
          VERSION="${TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"

          echo "current=$VERSION" >> $GITHUB_OUTPUT
          echo "next=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "Stable release: $VERSION → Next version: $NEXT_VERSION"

      - name: Check for existing bootstrap PR
        id: check-pr
        run: |
          BRANCH="bootstrap/${{ steps.next-version.outputs.next }}"
          EXISTING_PR=$(gh pr list --base main --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "Bootstrap PR #${EXISTING_PR} already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Deleting orphaned branch $BRANCH"
            git push origin --delete "$BRANCH" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create bootstrap branch and PR
        if: ${{ steps.check-pr.outputs.exists == 'false' }}
        run: |
          NEXT="${{ steps.next-version.outputs.next }}"
          BRANCH="bootstrap/${NEXT}"

          git checkout -b "$BRANCH"

          # Clean up release-as from both configs (don't update manifest - release-please calculates version from tags)
          if jq -e 'has("release-as")' .github/release-please-config.json > /dev/null 2>&1; then
            jq 'del(."release-as")' .github/release-please-config.json > tmp.json
            mv tmp.json .github/release-please-config.json
          fi
          if jq -e 'has("release-as")' .github/release-please-config-rc.json > /dev/null 2>&1; then
            jq 'del(."release-as")' .github/release-please-config-rc.json > tmp.json
            mv tmp.json .github/release-please-config-rc.json
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: bootstrap v$NEXT RC cycle after v${{ steps.next-version.outputs.current }} stable release"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: bootstrap v$NEXT development cycle" \
            --body "## Summary

          Bootstraps the next development cycle after stable release v${{ steps.next-version.outputs.current }}.

          ### What this PR does
          - Cleans up \`release-as\` from config files

          ### What happens when merged
          - Release-please will create v${NEXT}-rc from conventional commits
          - Subsequent releases: v${NEXT}-rc.1 → rc.2 → ... → v${NEXT} (stable)

          ---
          **Previous Stable:** v${{ steps.next-version.outputs.current }}
          **Next Version:** $NEXT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
