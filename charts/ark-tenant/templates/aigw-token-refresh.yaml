{{- if .Values.aigwTokenRefresh.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.aigwTokenRefresh.saCredentialsSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ark-tenant.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-id: {{ required "aigwTokenRefresh.clientId is required" .Values.aigwTokenRefresh.clientId | quote }}
  client-secret: {{ required "aigwTokenRefresh.clientSecret is required" .Values.aigwTokenRefresh.clientSecret | quote }}
  instance-id: {{ required "aigwTokenRefresh.instanceId is required" .Values.aigwTokenRefresh.instanceId | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.aigwTokenRefresh.aigwSecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ark-tenant.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: "{{ .Values.aigwTokenRefresh.clientId }}:{{ .Values.aigwTokenRefresh.clientSecret }}"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: aigw-token-refresh
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ark-tenant.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.aigwTokenRefresh.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: {{ include "ark-tenant.serviceAccountName" . }}
          restartPolicy: OnFailure
          containers:
            - name: refresh
              image: {{ .Values.aigwTokenRefresh.image }}
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  umask 077

                  CLIENT_ID=$(cat /etc/aigw/client-id)
                  CLIENT_SECRET=$(cat /etc/aigw/client-secret)
                  INSTANCE_ID=$(cat /etc/aigw/instance-id)

                  printf 'header = "Authorization: Bearer %s:%s"\nheader = "X-Instance-Id: %s"\n' \
                    "$CLIENT_ID" "$CLIENT_SECRET" "$INSTANCE_ID" > /scratch/curl.cfg

                  RESPONSE=$(curl -sf -K /scratch/curl.cfg "{{ .Values.aigwTokenRefresh.saEndpoint }}")

                  NEW_ID=$(printf '%s' "$RESPONSE" | sed -n 's/.*"client_id":"\([^"]*\)".*/\1/p')
                  NEW_SECRET=$(printf '%s' "$RESPONSE" | sed -n 's/.*"client_secret":"\([^"]*\)".*/\1/p')

                  if [ -z "$NEW_ID" ] || [ -z "$NEW_SECRET" ]; then
                    echo "ERROR: failed to fetch credentials"
                    exit 1
                  fi

                  printf '%s' "$NEW_ID" > /scratch/client-id
                  printf '%s' "$NEW_SECRET" > /scratch/client-secret
                  printf '%s' "$INSTANCE_ID" > /scratch/instance-id
                  printf '%s:%s' "$NEW_ID" "$NEW_SECRET" > /scratch/api-key

                  if [ "$NEW_ID" != "$CLIENT_ID" ] || [ "$NEW_SECRET" != "$CLIENT_SECRET" ]; then
                    kubectl create secret generic {{ .Values.aigwTokenRefresh.saCredentialsSecret }} \
                      --from-file=client-id=/scratch/client-id \
                      --from-file=client-secret=/scratch/client-secret \
                      --from-file=instance-id=/scratch/instance-id \
                      --dry-run=client -o yaml | kubectl apply -f -
                  fi

                  kubectl create secret generic {{ .Values.aigwTokenRefresh.aigwSecret }} \
                    --from-file=api-key=/scratch/api-key \
                    --dry-run=client -o yaml | kubectl apply -f -
              volumeMounts:
                - name: aigw
                  mountPath: /etc/aigw
                  readOnly: true
                - name: scratch
                  mountPath: /scratch
          volumes:
            - name: aigw
              secret:
                secretName: {{ .Values.aigwTokenRefresh.saCredentialsSecret }}
            - name: scratch
              emptyDir:
                medium: Memory
{{- end }}
