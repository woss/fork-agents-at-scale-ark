apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            {{- if .Values.tls.enabled }}
            - --tls-port
            - "6379"
            - --port
            - "0"
            - --tls-cert-file
            - /etc/redis-tls/tls.crt
            - --tls-key-file
            - /etc/redis-tls/tls.key
            - --tls-ca-cert-file
            - /etc/redis-tls/ca.crt
            - --tls-auth-clients
            - "no"
            {{- end }}
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-password
                  key: password
          {{- if .Values.tls.enabled }}
          volumeMounts:
            - name: redis-tls
              mountPath: /etc/redis-tls
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.tls.enabled }}
      volumes:
        - name: redis-tls
          secret:
            secretName: {{ .Release.Name }}-tls
      {{- end }}
