{{- if .Values.tls.enabled }}
{{- $secretName := printf "%s-tls" .Release.Name }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $cert := dict }}
{{- if and $existing $existing.data }}
{{- $cert = dict "Cert" (index $existing.data "tls.crt" | b64dec) "Key" (index $existing.data "tls.key" | b64dec) }}
{{- else }}
{{- $altNames := list .Release.Name (printf "%s.%s" .Release.Name .Release.Namespace) (printf "%s.%s.svc" .Release.Name .Release.Namespace) (printf "%s.%s.svc.cluster.local" .Release.Name .Release.Namespace) }}
{{- $cert = genSelfSignedCert (printf "%s.%s.svc.cluster.local" .Release.Name .Release.Namespace) nil $altNames 3650 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app: {{ .Release.Name }}
type: Opaque
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  ca.crt: {{ $cert.Cert | b64enc }}
{{- end }}
