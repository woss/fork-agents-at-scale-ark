# Grants edit access to the `marketplace-sources` ConfigMap in one namespace.
# Read access is already granted via the tenant role. Edit `namespace` and subjects.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: marketplace-source-editor
  namespace: team-a
subjects:
  - kind: User
    name: alice@example.com
    apiGroup: rbac.authorization.k8s.io
  # - kind: Group
  #   name: platform-admins
  #   apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: marketplace-source-editor
  apiGroup: rbac.authorization.k8s.io
